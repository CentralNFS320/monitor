<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitor Real Time</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .painel {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: background-color 0.5s ease;
            background-color: #222222; /* Cor inicial neutra */
        }
        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #0af; /* CF SISTEMAS em Azul */
        }
        .status-texto {
            font-size: 24px;
            font-weight: bold;
            word-wrap: break-word;
            transition: color 0.5s ease;
        }

        /* CONFIGURAÇÃO DE CORES COM LETRAS ESCURAS (ESTÁTICO) */
        .alarme-estatico { background-color: #D32F2F !important; color: #300 !important; }
        .falha-estatica { background-color: #FBC02D !important; color: #440 !important; }
        .normal-estatico { background-color: #388E3C !important; color: #020 !important; }
        
        .btn-link {
            display: inline-block;
            margin-top: 25px;
            color: #555;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #333;
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="painel" id="painel-status">
        <h1 id="titulo-sistema">CF SISTEMAS</h1>
        <div class="status-texto" id="texto-notifier">Sincronizando...</div>
        <a href="historico.html" class="btn-link">RASTREADOR DE EVENTOS</a>
    </div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa"; 

        function atualizarEstilo(mensagem) {
            const divPainel = document.getElementById("painel-status");
            const divTexto = document.getElementById("texto-notifier");
            let mU = mensagem.toUpperCase();
            
            // Limpa classes anteriores
            divPainel.classList.remove("alarme-estatico", "falha-estatica", "normal-estatico");
            divPainel.style.backgroundColor = ""; 

            if (mU.includes("FIRE") || mU.includes("ALARM") || mU.includes("FOGO") || mU.includes("INCENDIO")) {
                divPainel.classList.add("alarme-estatico");
            } 
            else if (mU.includes("FAULT") || mU.includes("FALHA") || mU.includes("TROUBLE") || mU.includes("AVARIA") || mU.includes("PROBL") || mU.includes("LPR")) {
                divPainel.classList.add("falha-estatica");
            }
            else if (mU.includes("NORMAL") || mU.includes("RESET")) {
                divPainel.classList.add("normal-estatico");
            } else {
                divPainel.style.backgroundColor = "#222";
                divTexto.style.color = "#fff";
            }
        }

        async function atualizar() {
            const url = `https://blynk.cloud/external/api/get?token=${TOKEN}&V1&_=${Date.now()}`;
            try {
                const response = await fetch(url);
                const texto = await response.text();
                let msg = texto.replace(/[\[\]"{}]/g, "").replace("V1:", "").trim();
                
                if(!msg || msg === "null") msg = "SISTEMA NORMAL";

                document.getElementById("texto-notifier").innerText = msg;
                atualizarEstilo(msg);

            } catch (e) {
                console.log("Erro de conexão");
            }
        }

        setInterval(atualizar, 2000);
        atualizar();
    </script>
</body>
</html>
