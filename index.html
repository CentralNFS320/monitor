<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - MONITOR</title>
    <style>
        /* Estilo Base - Modo Escuro */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0a0a0a; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            transition: background 0.5s; /* Transição suave para o vermelho */
        }

        .container { text-align: center; width: 90%; max-width: 600px; }

        .card {
            background: #151515;
            padding: 40px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #333;
            transition: all 0.5s;
        }

        #status-texto { 
            font-size: 28px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin: 20px 0;
            line-height: 1.3;
        }

        /* --- MODO LANTERNA VERMELHA (ALARME) --- */
        body.alarme-ativo { 
            background: #900 !important; /* Vermelho forte no fundo */
            animation: lanterna 1s infinite;
        }

        .alarme-ativo .card {
            background: #f00 !important; /* Card vermelho vivo */
            border-color: #fff;
            box-shadow: 0 0 50px #f00;
        }

        .alarme-ativo #status-texto {
            color: #fff !important;
            text-shadow: 2px 2px 5px #000;
        }

        @keyframes lanterna {
            0% { background: #900; }
            50% { background: #f00; }
            100% { background: #900; }
        }

        /* --- MODO NORMAL --- */
        .normal { color: #0f7; }
        
        .btn {
            display: inline-block; margin-top: 30px; padding: 12px 24px;
            background: #222; color: #0af; border: 1px solid #0af;
            text-decoration: none; border-radius: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="color:#0af; margin-bottom: 5px;">CF SISTEMAS</h1>
        <p style="color:#666; margin-bottom: 30px;">MONITORAMENTO NOTIFIER NFS-320</p>

        <div id="painel-card" class="card">
            <div id="status-texto">SINCRONIZANDO...</div>
        </div>

        <a href="historico.html" class="btn">📜 ABRIR RASTREADOR / BUSCA</a>
    </div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";

        function atualizar() {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V1&_=${Date.now()}`)
                .then(r => r.text())
                .then(data => {
                    let msg = data.replace(/[\[\]"{}]/g, "").replace("V1:", "").trim();
                    if (!msg || msg === "null" || msg === "") msg = "SISTEMA NORMAL";

                    const texto = document.getElementById('status-texto');
                    const corpo = document.body;
                    texto.innerText = msg;

                    let m = msg.toUpperCase();

                    // Lógica para Ativar Lanterna Vermelha
                    if (m.includes("FIRE") || m.includes("ALARM") || m.includes("FOGO") || m.includes("INCENDIO")) {
                        corpo.className = "alarme-ativo";
                    } 
                    else {
                        corpo.className = ""; // Remove lanterna
                        if (m.includes("NORMAL")) {
                            texto.className = "normal";
                        } else {
                            texto.style.color = "#ff0"; // Amarelo para falhas (PROBL, LPR, etc)
                        }
                    }
                });
        }

        setInterval(atualizar, 1500);
        atualizar();
    </script>
</body>
</html>
