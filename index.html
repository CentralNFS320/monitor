<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Teste de Comunicação</title>
    <style>
        body { font-family: monospace; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        .painel { background: #000; border: 2px solid #2ecc71; padding: 20px; display: inline-block; width: 90%; max-width: 500px; border-radius: 8px; margin-top: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status-texto { font-size: 20px; color: #2ecc71; font-weight: bold; margin: 20px 0; white-space: pre-wrap; }
        .info-sub { font-size: 11px; color: #555; font-family: sans-serif; }
        .log-box { background: #050505; border: 1px solid #333; padding: 10px; height: 180px; overflow-y: scroll; text-align: left; font-size: 12px; color: #0f0; white-space: pre-wrap; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="painel">
        <h2>CF SISTEMAS - MONITORAMENTO</h2>
        <h5 style="color: #666; margin-top: -5px;">Teste Direto via API REST</h5>
        <hr style="border-color: #222;">
        
        <div id="msgCentral" class="status-texto">Conectando ao Firebase...</div>
        <p id="infoRede" class="info-sub">Iniciando busca de pacotes...</p>
        
        <h4 style="text-align: left; margin-bottom: 5px; color: #aaa;">📜 HISTÓRICO DE EVENTOS:</h4>
        <div id="logBox" class="log-box">Aguardando sincronismo...</div>
    </div>

    <script>
        // Força a URL correta diretamente, ignorando qualquer lixo de memória anterior
        // COLOQUE ESTA NO LUGAR (ADICIONANDO O PARÂMETRO COM A SUA KEY):
        const URL_REST = "https://firebaseio.com?key=AIzaSyDXqeZodkk0PaTeVvsQZCY410ymNca2xQE";


        function atualizarPainelSimples() {
            fetch(URL_REST)
                .then(res => {
                    if (!res.ok) throw new Error("Erro na requisição: " + res.status);
                    return res.json();
                })
                .then(data => {
                    if (!data) {
                        document.getElementById("msgCentral").innerText = "BANCO SEM DADOS";
                        document.getElementById("msgCentral").style.color = "#f1c40f";
                        return;
                    }

                    // Mostra o texto atual da Notifier enviado pelo ESP
                    document.getElementById("msgCentral").innerText = data.status || "Aguardando evento...";
                    
                    // Ajusta a cor dinamicamente com base no tipo_status
                    if (data.tipo_status === "FALHA") {
                        document.getElementById("msgCentral").style.color = "#f1c40f";
                    } else if (data.tipo_status === "FOGO") {
                        document.getElementById("msgCentral").style.color = "#ff3333";
                    } else {
                        document.getElementById("msgCentral").style.color = "#2ecc71";
                    }

                    document.getElementById("infoRede").innerText = "Monitoramento ativo com a nuvem | Classe: " + (data.tipo_status || "NORMAL");

                    // Renderiza o histórico de forma simples
                    if (data.historico) {
                        let stringLogs = "";
                        Object.keys(data.historico).slice(-15).forEach(key => {
                            const log = data.historico[key];
                            if (typeof log === 'string') {
                                stringLogs = "> " + log + "\n" + stringLogs;
                            } else if (log && log.mensagem) {
                                stringLogs = "> " + log.mensagem + "\n" + stringLogs;
                            }
                        });
                        document.getElementById("logBox").innerText = stringLogs;
                    }
                })
                .catch(err => {
                    console.error("Falha ao conectar:", err);
                    document.getElementById("msgCentral").innerText = "FALHA DE SINCRONISMO";
                    document.getElementById("msgCentral").style.color = "#ff3333";
                    document.getElementById("infoRede").innerText = "Erro ao ler rota REST. Certifique-se de que as regras do Firebase estão públicas.";
                });
        }

        // Executa a primeira busca na hora e repete a cada 3 segundos
        atualizarPainelSimples();
        setInterval(atualizarPainelSimples, 3000);
    </script>
</body>
</html>
