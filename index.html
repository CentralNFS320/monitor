<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CF SISTEMAS - Histórico</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; padding: 20px; text-align: center; }
        .panel { background: #151515; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .log-box { background: #1a1a1a; padding: 12px; border-radius: 8px; text-align: left; border-left: 5px solid #0af; margin: 8px auto; font-family: monospace; font-size: 14px; max-width: 500px; box-shadow: inset 2px 2px 5px #000; }
        .btn { background: #007bff; color: #fff; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        input[type="date"] { background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn-voltar { color: #888; text-decoration: none; display: block; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-voltar">← VOLTAR AO PAINEL</a>
    <h2>HISTÓRICO DE EVENTOS</h2>
    
    <div class="panel">
        <button class="btn" onclick="solicitarTudo()">CARREGAR TODOS OS EVENTOS</button>
        <p style="font-size: 12px; color: #666;">OU FILTRAR POR DATA:</p>
        <input type="date" id="dataBusca" onchange="buscarData()">
    </div>

    <div id="logs"></div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";

        function solicitarTudo() {
            document.getElementById('logs').innerHTML = "<div class='log-box'>Solicitando memória interna... aguarde.</div>";
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V3=1`);
        }

        function buscarData() {
            let d = document.getElementById('dataBusca').value;
            if(!d) return;
            let p = d.split('-');
            let df = p[2] + '/' + p[1] + '/' + p[0].substring(2); // DD/MM/AA
            document.getElementById('logs').innerHTML = `<div class='log-box'>Buscando eventos de ${df}...</div>`;
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V4=${df}`);
        }

        function monitorar() {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2&_=${new Date().getTime()}`)
            .then(r => r.text()).then(t => {
                // Limpa JSON se houver
                let data = t.replace(/[\[\]"{} ]/g, "").replace("V2:", "");
                
                if (data.length > 5 && !data.includes("NORMALIZADO")) {
                    const box = document.getElementById('logs');
                    
                    // Se for uma lista de eventos (vários \n)
                    if (t.includes("\n")) {
                        box.innerHTML = "";
                        t.split('\n').reverse().forEach(linha => {
                            if(linha.trim().length > 5) {
                                box.innerHTML += `<div class="log-box">${linha}</div>`;
                            }
                        });
                    }
                }
            });
        }
        
        setInterval(monitorar, 3000);
    </script>
</body>
</html>
