<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitoramento Remoto</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
        }
        .card {
            background: #333;
            padding: 20px;
            border-top: 5px solid #0af;
            display: inline-block;
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: border-color 0.5s ease;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            color: #0af;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0af;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
        }
        .filtro-container {
            margin-top: 15px;
            background: #222;
            padding: 15px;
            border-radius: 5px;
            display: none;
            text-align: left;
        }
        .filtro-linha {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .filtro-linha label {
            font-size: 14px;
            color: #aaa;
        }
        /* Ajuste dos inputs de busca */
        .input-custom {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            font-size: 14px;
            width: 65%;
            box-sizing: border-box;
            cursor: pointer;
        }
        .btn-busca {
            background: #0af;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }
        .log-container {
            background: #000;
            border: 1px solid #444;
            padding: 10px;
            height: 250px;
            overflow-y: scroll;
            text-align: left;
            white-space: pre-wrap;
            font-family: monospace;
            color: #0f0;
            margin-top: 10px;
            display: none;
            border-radius: 5px;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>CF SISTEMAS</h1>
        <h3>Monitoramento NFS-320 (Remoto)</h3>
        
        <div id="ev" style="font-size:18px; color:#2ecc71; margin:20px 0; min-height:50px; font-weight:bold;">
            Conectando ao Firebase...
        </div>
        
        <p style="color:#888; font-size:12px;">Status: Monitoramento Global Ativo</p>
        <hr>
        
        <div class="btn" id="btnLog" onclick="toggleHistorico()">📜 VER HISTÓRICO REMOTO</div>
        
        <div class="filtro-container" id="filtroContainer">
            <div class="filtro-linha">
                <label>📅 Escolher Data:</label>
                <input type="text" id="buscaData" class="input-custom" placeholder="Selecione o dia...">
            </div>
            <div class="filtro-linha">
                <label>🕒 Escolher Hora:</label>
                <input type="text" id="buscaHora" class="input-custom" placeholder="Selecione a hora...">
            </div>
            
            <button class="btn-busca" onclick="filtrarPorDataHora()">🔍 Buscar Eventos</button>
            <button class="btn-busca" style="background:#27ae60;" onclick="limparFiltro()">📋 VER TODO O HISTÓRICO</button>
        </div>

        <div class="log-container" id="logContainer">Carregando histórico da nuvem...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDxqeZodkk0PaTeVvsQZCY410ymNca2xQE",
            authDomain: "munitor-de-alarme.firebaseapp.com",
            databaseURL: "https://munitor-de-alarme-default-rtdb.firebaseio.com",
            projectId: "munitor-de-alarme",
            storageBucket: "munitor-de-alarme.firebasestorage.app",
            messagingSenderId: "110591997556",
            appId: "1:110591997556:web:98493257f6b77d691c0321"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const card = document.getElementById('mainCard');
        const evDiv = document.getElementById('ev');
        const logContainer = document.getElementById('logContainer');
        const filtroContainer = document.getElementById('filtroContainer');
        
        let todosOsLogs = []; 

        // Ativa o calendário e relógio compatível com Windows 7
        flatpickr("#buscaData", {
            dateFormat: "d/m/Y",
            locale: "pt"
        });

        flatpickr("#buscaHora", {
            enableTime: true,
            noCalendar: true,
            dateFormat: "H:i",
            time_24hr: true
        });

        // Monitoramento de Status
        database.ref('/central/status').on('value', (snapshot) => {
            const msg = snapshot.val() || "Aguardando Notifier...";
            evDiv.innerText = msg;
            const msgMaiuscula = msg.toUpperCase();

            if (msgMaiuscula.includes("FOGO") || msgMaiuscula.includes("INCENDIO") || msgMaiuscula.includes("ALARME") || msgMaiuscula.includes("ALARM")) {
                evDiv.style.color = "#ff0000";
                evDiv.style.animation = "blink 1s infinite";
                card.style.borderTopColor = "#ff0000";
            } else if (msgMaiuscula.includes("NORMAL") || msgMaiuscula.includes("RESET") || msgMaiuscula.includes("SISTEMA OK") || msgMaiuscula.includes("AGUARDANDO")) {
                evDiv.style.color = "#2ecc71";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#2ecc71";
            } else {
                evDiv.style.color = "#f1c40f";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#f1c40f";
            }
        });

        // Coleta o histórico da nuvem
        database.ref('/central/historico').limitToLast(800).on('value', (snapshot) => {
            todosOsLogs = [];
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                if (data && data.mensagem) {
                    todosOsLogs.push("> " + data.mensagem);
                }
            });
            renderizarLogs(todosOsLogs);
        });

        function renderizarLogs(lista) {
            let html = "";
            lista.forEach(linha => {
                html += linha + "\n";
            });
            logContainer.innerText = html || "Nenhum evento encontrado para esta combinação.";
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // Filtro que busca o texto da data/hora gravado pela central Notifier
        function filtrarPorDataHora() {
            const dataSelecionada = document.getElementById('buscaData').value; // Retorna "DD/MM/AAAA"
            const horaSelecionada = document.getElementById('buscaHora').value; // Retorna "HH:MM"

            if (!dataSelecionada) {
                alert("Por favor, selecione ao menos uma data!");
                return;
            }

            // Gera versões de ano com 4 e 2 dígitos (ex: 2026 e 26) para bater com a central
            const partes = dataSelecionada.split('/');
            const anoCurto = partes[2].substring(2, 4);
            const formatoDataCurto = `${partes[0]}/${partes[1]}/${anoCurto}`; // "04/06/26"

            const logsFiltrados = todosOsLogs.filter(linha => {
                const linhaUpper = linha.toUpperCase();
                
                // Procura se o texto da linha tem a data escolhida
                const contemData = linhaUpper.includes(dataSelecionada) || linhaUpper.includes(formatoDataCurto);
                
                // Procura se tem a hora escolhida (se foi preenchida)
                const contemHora = horaSelecionada ? linhaUpper.includes(horaSelecionada) : true;

                return contemData && contemHora;
            });

            renderizarLogs(logsFiltrados);
        }

        function limparFiltro() {
            document.getElementById('buscaData')._flatpickr.clear();
            document.getElementById('buscaHora')._flatpickr.clear();
            renderizarLogs(todosOsLogs);
        }

        function toggleHistorico() {
            if (logContainer.style.display === "block") {
                logContainer.style.display = "none";
                filtroContainer.style.display = "none";
                document.getElementById('btnLog').innerText = "📜 VER HISTÓRICO REMOTO";
            } else {
                logContainer.style.display = "block";
                filtroContainer.style.display = "block";
                document.getElementById('btnLog').innerText = "⬅️ FECHAR HISTÓRICO";
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        }
    </script>
</body>
</html>
