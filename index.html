<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitoramento Remoto</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
        }
        .card {
            background: #333;
            padding: 20px;
            border-top: 5px solid #0af;
            display: inline-block;
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: border-color 0.5s ease;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            color: #0af;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0af;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
        }
        .filtro-container {
            margin-top: 15px;
            background: #222;
            padding: 15px;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
        .flatpickr-calendar.inline {
            margin: 10px auto !important;
            display: block !important;
        }
        .btn-busca {
            background: #0af;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }
        .log-container {
            background: #000;
            border: 1px solid #444;
            padding: 10px;
            height: 250px;
            overflow-y: scroll;
            text-align: left;
            white-space: pre-wrap;
            font-family: monospace;
            color: #0f0;
            margin-top: 10px;
            display: none;
            border-radius: 5px;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>CF SISTEMAS</h1>
        <h3>Monitoramento NFS-320 (Remoto)</h3>
        
        <div id="ev" style="font-size:18px; color:#2ecc71; margin:20px 0; min-height:50px; font-weight:bold;">
            Conectando ao Firebase...
        </div>
        
        <p style="color:#888; font-size:12px;">Status: Monitoramento Global Ativo</p>
        <hr>
        
        <div class="btn" id="btnLog" onclick="toggleHistorico()">📜 VER HISTÓRICO REMOTO</div>
        
        <div class="filtro-container" id="filtroContainer">
            <label style="font-size: 14px; color: #aaa; display:block; margin-bottom:5px;">📅 Selecione a Data e Hora desejada:</label>
            
            <input type="text" id="buscaData" style="display:none;">
            
            <button class="btn-busca" onclick="filtrarPorDataHora()">🔍 Buscar Eventos</button>
            <button class="btn-busca" style="background:#27ae60;" onclick="limparFiltro()">📋 VER TODO O HISTÓRICO</button>
            <button class="btn-busca" style="background:#555; margin-top: 5px;" onclick="minimizarPainel()">❌ FECHAR OPÇÕES DE BUSCA</button>
        </div>

        <div class="log-container" id="logContainer">Carregando histórico da nuvem...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDxqeZodkk0PaTeVvsQZCY410ymNca2xQE",
            authDomain: "munitor-de-alarme.firebaseapp.com",
            databaseURL: "https://munitor-de-alarme-default-rtdb.firebaseio.com",
            projectId: "munitor-de-alarme",
            storageBucket: "munitor-de-alarme.firebasestorage.app",
            messagingSenderId: "110591997556",
            appId: "1:110591997556:web:98493257f6b77d691c0321"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const card = document.getElementById('mainCard');
        const evDiv = document.getElementById('ev');
        const logContainer = document.getElementById('logContainer');
        const filtroContainer = document.getElementById('filtroContainer');
        
        let todosOsLogs = []; 
        let fp; // Guardará a instância do calendário

        // Inicializa o Flatpickr unificando Data + Relógio de Hora/Minuto na mesma tela
        fp = flatpickr("#buscaData", {
            inline: true,
            enableTime: true,
            time_24hr: true,
            dateFormat: "d/m/Y H:i",
            locale: "pt"
        });

        function formatarLinhaNotifier(linha) {
            const padrao = /(\d{2}:\d{2}[AP])\s+(\d{6})/;
            const match = linha.match(padrao);

            if (match) {
                const horaOriginal = match[1]; 
                const dataOriginal = match[2]; 

                const mes = dataOriginal.substring(0, 2);
                const dia = dataOriginal.substring(2, 4);
                const ano = "20" + dataOriginal.substring(4, 6);

                const dataFormatada = `${dia}/${mes}/${ano}`;
                return linha.replace(padrao, `${horaOriginal} - ${dataFormatada}`);
            }
            return linha; 
        }

        database.ref('/central/status').on('value', (snapshot) => {
            const msg = snapshot.val() || "Aguardando Notifier...";
            evDiv.innerText = formatarLinhaNotifier(msg);
            const msgMaiuscula = msg.toUpperCase();

            if (msgMaiuscula.includes("FOGO") || msgMaiuscula.includes("INCENDIO") || msgMaiuscula.includes("ALARME") || msgMaiuscula.includes("ALARM")) {
                evDiv.style.color = "#ff0000";
                evDiv.style.animation = "blink 1s infinite";
                card.style.borderTopColor = "#ff0000";
            } else if (msgMaiuscula.includes("NORMAL") || msgMaiuscula.includes("RESET") || msgMaiuscula.includes("SISTEMA OK") || msgMaiuscula.includes("AGUARDANDO")) {
                evDiv.style.color = "#2ecc71";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#2ecc71";
            } else {
                evDiv.style.color = "#f1c40f";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#f1c40f";
            }
        });

        database.ref('/central/historico').limitToLast(800).on('value', (snapshot) => {
            todosOsLogs = [];
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                if (data && data.mensagem) {
                    todosOsLogs.push("> " + data.mensagem);
                }
            });
            renderizarLogs(todosOsLogs);
        });

        function renderizarLogs(lista) {
            let html = "";
            lista.forEach(linha => {
                html += formatarLinhaNotifier(linha) + "\n";
            });
            logContainer.innerText = html || "Nenhum evento encontrado para os critérios selecionados.";
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // Realiza o filtro inteligente cruzando Data (MMDDAA) e Hora da Notifier
        function filtrarPorDataHora() {
            const stringCompleta = document.getElementById('buscaData').value; // Retorna "DD/MM/AAAA HH:MM" ou apenas "DD/MM/AAAA"

            if (!stringCompleta) {
                alert("Por favor, selecione uma data no calendário!");
                return;
            }

            // Separa os dados digitados/clicados
            const partesEspaco = stringCompleta.split(' ');
            const dataParte = partesEspaco[0]; // "DD/MM/AAAA"
            const horaParte = partesEspaco[1] ? partesEspaco[1] : ""; // "HH:MM"

            const partesData = dataParte.split('/');
            const dia = partesData[0];  
            const mes = partesData[1];  
            const anoCurto = partesData[2].substring(2, 4); 

            const formatoDataNotifier = `${mes}${dia}${anoCurto}`; // Ex: "060426"

            const logsFiltrados = todosOsLogs.filter(linha => {
                const linhaUpper = linha.toUpperCase();
                const temPadraoNotifier = /(\d{2}:\d{2}[AP])\s+(\d{6})/.test(linhaUpper);

                if (temPadraoNotifier) {
                    const contemData = linhaUpper.includes(formatoDataNotifier);
                    
                    // Se o usuário mexeu na hora, filtra por ela também (independente de ser AM/PM ou formato de 24h)
                    let contemHora = true;
                    if (horaParte) {
                        // Limpa os dois pontos da hora para buscar de forma maleável se necessário
                        contemHora = linhaUpper.includes(horaParte);
                    }
                    return contemData && contemHora;
                } else {
                    // Logs normais de teste aparecem no dia corrente
                    const hoje = new Date();
                    const dataHojeStr = `${String(hoje.getDate()).padStart(2, '0')}/${String(hoje.getMonth() + 1).padStart(2, '0')}/${hoje.getFullYear()}`;
                    return dataParte === dataHojeStr;
                }
            });

            renderizarLogs(logsFiltrados);
        }

        function limparFiltro() {
            if(fp) fp.clear();
            renderizarLogs(todosOsLogs);
        }

        function minimizarPainel() {
            filtroContainer.style.display = "none";
            document.getElementById('btnLog').innerText = "📜 VER HISTÓRICO REMOTO";
        }

        function toggleHistorico() {
            if (logContainer.style.display === "block" && filtroContainer.style.display === "block") {
                logContainer.style.display = "none";
                filtroContainer.style.display = "none";
                document.getElementById('btnLog').innerText = "📜 VER HISTÓRICO REMOTO";
            } else {
                logContainer.style.display = "block";
                filtroContainer.style.display = "block";
                document.getElementById('btnLog').innerText = "⬅️ FECHAR HISTÓRICO";
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        }
    </script>
</body>
</html>
