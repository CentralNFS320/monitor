<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitor Real Time</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .painel {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: background-color 0.5s ease;
            background-color: #222222; /* Cor inicial neutra */
        }
        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #0af; /* Azul padrão CF SISTEMAS no título */
        }
        .status-texto {
            font-size: 22px;
            font-weight: bold;
            word-wrap: break-word;
        }
        .btn-link {
            display: inline-block;
            margin-top: 25px;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="painel" id="painel-status">
        <h1 id="titulo-sistema">CF SISTEMAS</h1>
        <div class="status-texto" id="texto-notifier">Sincronizando com a central...</div>
        <a href="historico.html" class="btn-link">📜 Abrir Rastreador de Eventos</a>
    </div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa"; 

        function obterCorPorMensagem(mensagem) {
            let mU = mensagem.toUpperCase();
            
            // 1. Vermelho: Fogo ou Alarmes
            if (mU.includes("FIRE") || mU.includes("ALARM") || mU.includes("FOGO") || mU.includes("INCENDIO")) {
                return "#D32F2F"; 
            }
            // 2. Amarelo: Falhas ou Avarias
            if (mU.includes("FAULT") || mU.includes("FALHA") || mU.includes("TROUBLE") || mU.includes("AVARIA") || mU.includes("DESL")) {
                return "#FBC02D"; 
            }
            // 3. Verde: Normal ou Reset
            if (mU.includes("NORMAL") || mU.includes("RESET") || mU.includes("RESTORE")) {
                return "#388E3C"; 
            }
            
            return "#222222"; // Neutro
        }

        async function atualizar() {
            const url = `https://blynk.cloud/external/api/get?token=${TOKEN}&V1&_=${Date.now()}`;
            
            try {
                const response = await fetch(url);
                const textoPuro = await response.text();
                
                const divTexto = document.getElementById("texto-notifier");
                const divPainel = document.getElementById("painel-status");

                let msg = textoPuro.replace(/[\[\]"{}]/g, "").replace("V1:", "").trim();
                if(!msg || msg === "null") msg = "SISTEMA NORMAL";

                divTexto.innerText = msg;
                divPainel.style.backgroundColor = obterCorPorMensagem(msg);

            } catch (error) {
                console.error("Erro:", error);
            }
        }

        setInterval(atualizar, 2000);
        atualizar();
    </script>
</body>
</html>
