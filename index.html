<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitoramento Remoto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
        }
        .card {
            background: #333;
            padding: 20px;
            border-top: 5px solid #0af;
            display: inline-block;
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: border-color 0.5s ease;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            color: #0af;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0af;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
        }
        .log-container {
            background: #000;
            border: 1px solid #444;
            padding: 10px;
            height: 250px;
            overflow-y: scroll;
            text-align: left;
            white-space: pre-wrap;
            font-family: monospace;
            color: #0f0;
            margin-top: 15px;
            display: none; /* Inicia fechado */
            border-radius: 5px;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>CF SISTEMAS</h1>
        <h3>Monitoramento NFS-320 (Remoto)</h3>
        
        <div id="ev" style="font-size:18px; color:#2ecc71; margin:20px 0; min-height:50px; font-weight:bold;">
            Conectando ao Firebase...
        </div>
        
        <p style="color:#888; font-size:12px;">Status: Monitoramento Global Ativo</p>
        <hr>
        
        <div class="btn" id="btnLog" onclick="toggleHistorico()">📜 VER HISTÓRICO REMOTO</div>
        <div class="log-container" id="logContainer">Carregando histórico da nuvem...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Configurações do seu banco de dados Realtime Database
        const firebaseConfig = {
            apiKey: "AIzaSyDxqeZodkk0PaTeVvsQZCY410ymNca2xQE",
            authDomain: "munitor-de-alarme.firebaseapp.com",
            databaseURL: "https://munitor-de-alarme-default-rtdb.firebaseio.com",
            projectId: "munitor-de-alarme",
            storageBucket: "munitor-de-alarme.firebasestorage.app",
            messagingSenderId: "110591997556",
            appId: "1:110591997556:web:98493257f6b77d691c0321"
        };

        // Inicialização do Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const card = document.getElementById('mainCard');
        const evDiv = document.getElementById('ev');
        const logContainer = document.getElementById('logContainer');

        // 1. FILTRO DINÂMICO DE CORES POR EVENTO (FOGO/ALARMES, FALHAS E NORMALIZAÇÃO)
        database.ref('/central/status').on('value', (snapshot) => {
            const msg = snapshot.val() || "Aguardando Notifier...";
            evDiv.innerText = msg;

            const msgMaiuscula = msg.toUpperCase();

            // CASO 1: VERMELHO PISCANTE (Qualquer sinal de Alarme, Fogo ou Incêndio)
            if (msgMaiuscula.includes("FOGO") || msgMaiuscula.includes("INCENDIO") || msgMaiuscula.includes("ALARME") || msgMaiuscula.includes("ALARM")) {
                evDiv.style.color = "#ff0000";
                evDiv.style.animation = "blink 1s infinite";
                card.style.borderTopColor = "#ff0000";
            } 
            // CASO 2: AMARELO (Qualquer tipo de defeito, avaria, problemas de bateria ou falhas gerais)
            else if (msgMaiuscula.includes("FALHA") || msgMaiuscula.includes("DEFEITO") || msgMaiuscula.includes("AVARIA") || msgMaiuscula.includes("TROUBLE")) {
                evDiv.style.color = "#f1c40f";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#f1c40f";
            } 
            // CASO 3: VERDE (Mensagens de normalização, sistema resetado ou operando normalmente)
            else if (msgMaiuscula.includes("NORMAL") || msgMaiuscula.includes("RESET") || msgMaiuscula.includes("SISTEMA OK") || msgMaiuscula.includes("AGUARDANDO")) {
                evDiv.style.color = "#2ecc71";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#2ecc71";
            } 
            // CASO PADRÃO: Mantém em verde estável se não bater com nenhum critério de risco
            else {
                evDiv.style.color = "#2ecc71";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#2ecc71";
            }
        });

        // 2. ATUALIZAÇÃO DO HISTÓRICO EM TEMPO REAL
        database.ref('/central/historico').limitToLast(60).on('value', (snapshot) => {
            let logsHTML = "";
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                if (data && data.mensagem) {
                    logsHTML += "> " + data.mensagem + "\n";
                }
            });
            logContainer.innerText = logsHTML || "Sem novos logs registrados na nuvem.";
            logContainer.scrollTop = logContainer.scrollHeight; // Rola automaticamente para o fim
        });

        // 3. CORREÇÃO DA FUNÇÃO DE ABRIR/FECHAR HISTÓRICO
        function toggleHistorico() {
            // Verifica o estado atual computado para evitar bugs de inicialização vazia
            if (logContainer.style.display === "block") {
                logContainer.style.display = "none";
                document.getElementById('btnLog').innerText = "📜 VER HISTÓRICO REMOTO";
            } else {
                logContainer.style.display = "block";
                document.getElementById('btnLog').innerText = "⬅️ FECHAR HISTÓRICO";
                logContainer.scrollTop = logContainer.scrollHeight; // Garante que abra mostrando os últimos eventos
            }
        }
    </script>
</body>
</html>
