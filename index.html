<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Teste Rápido</title>
    <style>
        body { font-family: monospace; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        .painel { background: #000; border: 2px solid #2ecc71; padding: 20px; display: inline-block; width: 90%; max-width: 500px; border-radius: 8px; margin-top: 50px; }
        .status-texto { font-size: 20px; color: #2ecc71; font-weight: bold; margin: 20px 0; white-space: pre-wrap; }
        .log-box { background: #050505; border: 1px solid #333; padding: 10px; height: 150px; overflow-y: scroll; text-align: left; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="painel">
        <h2>CF SISTEMAS - MONITORAMENTO</h2>
        <hr style="border-color: #222;">
        <div id="msgCentral" class="status-texto">Conectando ao Firebase...</div>
        <p id="infoRede" style="font-size: 11px; color: #555;">Iniciando varredura...</p>
        
        <h4 style="text-align: left; margin-bottom: 5px; color: #aaa;">📜 ÚLTIMOS LOGS:</h4>
        <div id="logBox" class="log-box">Aguardando dados...</div>
    </div>

    <script>
        // URL 100% cravada no seu projeto oficial do Realtime Database
        const URL_FIREBASE = "https://firebaseio.com";

        function testarConexao() {
            fetch(URL_FIREBASE)
                .then(res => {
                    if (!res.ok) throw new Error("Erro HTTP: " + res.status);
                    return res.json();
                })
                .then(data => {
                    if (!data) {
                        document.getElementById("msgCentral").innerText = "BANCO DE DADOS VAZIO";
                        document.getElementById("msgCentral").style.color = "#f1c40f";
                        return;
                    }

                    // Exibe a mensagem atual da NFS-320
                    document.getElementById("msgCentral").innerText = data.status || "Sem mensagem enviada";
                    document.getElementById("msgCentral").style.color = (data.tipo_status === "FALHA") ? "#f1c40f" : "#2ecc71";
                    
                    document.getElementById("infoRede").innerText = "Sincronizado com sucesso! Classe: " + (data.tipo_status || "NORMAL");

                    // Monta o histórico simplificado
                    if (data.historico) {
                        let htmlLogs = "";
                        Object.keys(data.historico).slice(-10).forEach(key => {
                            const item = data.historico[key];
                            if (typeof item === 'string') {
                                htmlLogs = "> " + item + "\n" + htmlLogs;
                            } else if (item && item.mensagem) {
                                htmlLogs = "> " + item.mensagem + "\n" + htmlLogs;
                            }
                        });
                        document.getElementById("logBox").innerText = htmlLogs;
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("msgCentral").innerText = "ERRO DE CONEXÃO";
                    document.getElementById("msgCentral").style.color = "#ff3333";
                    document.getElementById("infoRede").innerText = "Verifique se as Regras do Firebase estão públicas (true).";
                });
        }

        // Executa na hora e atualiza a cada 3 segundos
        testarConexao();
        setInterval(testarConexao, 3000);
    </script>
</body>
</html>
