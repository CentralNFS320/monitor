<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitoramento Remoto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-top: 5px solid #2ecc71;
            display: inline-block;
            margin-top: 30px;
            width: 95%;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            transition: all 0.5s ease;
        }
        .tela-central {
            font-family: 'Courier New', Courier, monospace;
            background: #050505;
            color: #2ecc71;
            padding: 15px;
            text-align: left;
            font-size: 16px;
            line-height: 1.4;
            border-radius: 6px;
            border: 1px solid #333;
            white-space: pre-wrap;
            min-height: 80px;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin: 20px 0;
            transition: color 0.3s ease;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            color: #0af;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0af;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: rgba(0, 170, 255, 0.1);
        }
        .log-container {
            background: #000;
            border: 1px solid #333;
            padding: 12px;
            height: 300px;
            overflow-y: scroll;
            text-align: left;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            color: #2ecc71;
            margin-top: 15px;
            display: none;
            font-size: 13px;
        }
        /* Layout de Alerta de Queda de Sinal */
        .alerta-offline {
            background: #721c24;
            color: #f8d7da;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none; /* Escondido por padrão */
            border: 1px solid #f5c6cb;
        }
        @keyframes piscar {
            0% { box-shadow: 0 0 5px #ff3333; background: #1e1e1e; }
            100% { box-shadow: 0 0 25px #ff3333; background: #2a0000; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>CF SISTEMAS</h1>
        <h4 style="color:#888; margin-top:-10px;">Monitoramento NFS-320 (Remoto)</h4>
        
        <!-- Faixa de aviso de erro de conexão -->
        <div id="statusConexao" class="alerta-offline">🚨 ATENÇÃO: PERDA DE COMUNICAÇÃO COM O MÓDULO ESP32!</div>
        
        <!-- Bloco replicador de tela -->
        <div id="ev" class="tela-central">Conectando ao Firebase...</div>
        
        <p style="color:#666; font-size:12px;" id="txtStatus">Status: Sincronizando com a nuvem...</p>
        <hr style="border-color: #222;">
        
        <div class="btn" id="btnLog" onclick="toggleHistorico()">📜 VER HISTÓRICO REMOTO</div>
        <div class="log-container" id="logContainer">Carregando histórico da nuvem...</div>
    </div>

    <!-- CORRIGIDO: Scripts oficiais integrados com a sua arquitetura do Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // --- CONFIGURAÇÃO DO SEU PROJETO NO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDXqeZodkk0PaTeVvsQZCY410ymNca2xQE", 
            databaseURL: "https://munitor-de-alarme-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const card = document.getElementById('mainCard');
        const evDiv = document.getElementById('ev');
        const logContainer = document.getElementById('logContainer');
        const txtStatus = document.getElementById('txtStatus');
        const divOffline = document.getElementById('statusConexao');

        let statusAtual = "NORMAL";
        let ultimoPingESP = Date.now();
        let offsetTempoServidor = 0; // Armazena a diferença de relógio do PC com o Google

        // Calcula a diferença de relógio entre o computador local e o servidor Firebase
        database.ref(".info/serverTimeOffset").on("value", (snapshot) => {
            offsetTempoServidor = snapshot.val() || 0;
        });

        // 1. Escuta a classificação do status
        database.ref('/central/tipo_status').on('value', (snapshot) => {
            statusAtual = snapshot.val() || "NORMAL";
            atualizarLayoutCores();
        });

        // 2. Escuta o texto bruto enviado
        database.ref('/central/status').on('value', (snapshot) => {
            const msg = snapshot.val() || "Aguardando Notifier...";
            evDiv.innerText = msg;
            
            // Força a atualização do ping ao receber texto direto
            ultimoPingESP = Date.now() + offsetTempoServidor; 
            divOffline.style.display = "none";
        });

        // 3. CORRIGIDO: Escuta o Heartbeat oficial do ESP32 para monitorar queda de energia
        database.ref('/central/heartbeat').on('value', (snapshot) => {
            if (snapshot.exists()) {
                ultimoPingESP = snapshot.val();
            }
        });

        // Verifica a cada 3 segundos se o último sinal recebido tem mais de 25 segundos
        setInterval(() => {
            const tempoAtualServidor = Date.now() + offsetTempoServidor;
            const tempoSemSinal = (tempoAtualServidor - ultimoPingESP) / 1000;
            
            if (tempoSemSinal > 25) { 
                divOffline.style.display = "block";
                divOffline.innerText = "🚨 ALERTA: DISPOSITIVO OFFLINE HÁ " + Math.round(tempoSemSinal) + " SEGUNDOS!";
                evDiv.innerText = "SISTEMA DESCONECTADO\n(ESP32 SEM ALIMENTAÇÃO OU SEM WI-FI)";
                evDiv.style.color = "#f1c40f"; // Alerta Amarelo de Erro Geral
                card.style.borderTopColor = "#f1c40f";
                card.style.animation = "none";
                txtStatus.innerText = "Status: Indisponível | Sem sinal da placa";
            } else {
                divOffline.style.display = "none";
                atualizarLayoutCores();
            }
        }, 3000);

        function atualizarLayoutCores() {
            // Se o tempo sem sinal estourou o limite, ignora a triagem comum
            const tempoAtualServidor = Date.now() + offsetTempoServidor;
            const tempoSemSinal = (tempoAtualServidor - ultimoPingESP) / 1000;
            if (tempoSemSinal > 25) return;

            txtStatus.innerText = "Status: Monitoramento Ativo | Classe: " + statusAtual;

            if (statusAtual === "FOGO") {
                evDiv.style.color = "#ff3333";
                card.style.borderTopColor = "#ff3333";
                card.style.animation = "piscar 0.8s infinite alternate";
            } else if (statusAtual === "FALHA") {
                evDiv.style.color = "#f1c40f";
                card.style.borderTopColor = "#f1c40f";
                card.style.animation = "none";
            } else {
                evDiv.style.color = "#2ecc71";
                card.style.borderTopColor = "#2ecc71";
                card.style.animation = "none";
            }
        }

        // 4. Lista do Histórico (Corrigido as crases de Template Strings removidas por erro)
        database.ref('/central/historico').limitToLast(40).on('value', (snapshot) => {
            let logsHTML = "";
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                let prefixo = "> ";
                if(data.tipo === "FOGO") prefixo = "🚨 [ALARME] ";
                if(data.tipo === "FALHA") prefixo = "⚠️ [FALHA] ";
                logsHTML += prefixo + data.mensagem + "\n------------------------\n";
            });
            logContainer.innerText = logsHTML || "Sem novos logs registrados.";
            logContainer.scrollTop = logContainer.scrollHeight;
        });

        function toggleHistorico() {
            if (logContainer.style.display === "block") {
                logContainer.style.display = "none";
                document.getElementById('btnLog').innerText = "📜 VER HISTÓRICO REMOTO";
            } else {
                logContainer.style.display = "block";
                document.getElementById('btnLog').innerText = "⬅️ FECHAR HISTÓRICO";
            }
        }
    </script>
</body>
</html>
