<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitoramento Remoto</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
        }
        .card {
            background: #333;
            padding: 20px;
            border-top: 5px solid #0af;
            display: inline-block;
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: border-color 0.5s ease;
        }
        /* Tela de Login Industrial (CF SISTEMAS) */
        .login-container {
            display: block;
            margin-top: 50px;
        }
        .login-input {
            width: 85%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            color: #0af;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0af;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
        }
        .btn-busca {
            background: #0af;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }
        /* Painel Principal Inicialmente Escondido */
        .painel-principal {
            display: none;
        }
        .filtro-container {
            margin-top: 15px;
            background: #222;
            padding: 15px;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
        .flatpickr-calendar.inline {
            margin: 10px auto !important;
            display: block !important;
        }
        .log-container {
            background: #000;
            border: 1px solid #444;
            padding: 10px;
            height: 250px;
            overflow-y: scroll;
            text-align: left;
            white-space: pre-wrap;
            font-family: monospace;
            color: #0f0;
            margin-top: 10px;
            display: none;
            border-radius: 5px;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card login-container" id="telaLogin">
        <h1>CF SISTEMAS</h1>
        <h3>Acesso Restrito</h3>
        <p style="color: #aaa; font-size: 14px;">Insira as credenciais para acessar o monitoramento.</p>
        <input type="email" id="loginEmail" class="login-input" placeholder="E-mail do Administrador">
        <input type="password" id="loginSenha" class="login-input" placeholder="Senha de Acesso">
        <button class="btn-busca" onclick="realizarLogin()">🔓 Entrar no Sistema</button>
        <div id="erroLogin" style="color: #ff4757; margin-top: 10px; font-size: 14px; font-weight: bold;"></div>
    </div>

    <div class="painel-principal" id="painelMonitor">
        <div class="card" id="mainCard">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 12px; color: #888;">CF SISTEMAS</span>
                <button style="background: none; border: 1px solid #ff4757; color: #ff4757; border-radius: 3px; cursor: pointer; font-size: 11px;" onclick="realizarLogout()">Sair</button>
            </div>
            <h1 style="margin-top: 10px;">CF SISTEMAS</h1>
            <h3>Monitoramento NFS-320 (Remoto)</h3>
            
            <div id="ev" style="font-size:18px; color:#2ecc71; margin:20px 0; min-height:50px; font-weight:bold;">
                Carregando dados protegidos...
            </div>
            
            <p style="color:#888; font-size:12px;">Status: Conexão Criptografada Ativa</p>
            <hr>
            
            <div class="btn" id="btnLog" onclick="toggleHistorico()">📜 VER HISTÓRICO REMOTO</div>
            
            <div class="filtro-container" id="filtroContainer">
                <label style="font-size: 14px; color: #aaa; display:block; margin-bottom:5px;">📅 Selecione a Data e Hora desejada:</label>
                <input type="text" id="buscaData" style="display:none;">
                
                <button class="btn-busca" onclick="filtrarPorDataHora()">🔍 Buscar Eventos</button>
                <button class="btn-busca" style="background:#27ae60;" onclick="limparFiltro()">📋 VER TODO O HISTÓRICO</button>
                <button class="btn-busca" style="background:#555; margin-top: 5px;" onclick="minimizarPainel()">❌ FECHAR OPÇÕES DE BUSCA</button>
            </div>

            <div class="log-container" id="logContainer">Carregando histórico seguro...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
