<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitoramento Remoto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-top: 5px solid #2ecc71;
            display: inline-block;
            margin-top: 30px;
            width: 95%;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            transition: all 0.4s ease;
        }
        .tela-central {
            font-family: 'Courier New', Courier, monospace;
            background: #050505;
            color: #2ecc71;
            padding: 15px;
            text-align: left;
            font-size: 16px;
            line-height: 1.4;
            border-radius: 6px;
            border: 1px solid #333;
            white-space: pre-wrap;
            min-height: 80px;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin: 20px 0;
            transition: color 0.3s ease;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            color: #0af;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0af;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            user-select: none;
        }
        .btn:hover {
            background: rgba(0, 170, 255, 0.1);
        }
        .log-container {
            background: #000;
            border: 1px solid #333;
            padding: 12px;
            height: 300px;
            overflow-y: scroll;
            text-align: left;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            color: #2ecc71;
            margin-top: 15px;
            display: none;
            font-size: 13px;
        }
        .alerta-offline {
            background: #721c24;
            color: #f8d7da;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
            border: 1px solid #f5c6cb;
        }
        @keyframes piscar {
            0% { box-shadow: 0 0 5px #ff3333; background: #1e1e1e; }
            100% { box-shadow: 0 0 25px #ff3333; background: #2a0000; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>CF SISTEMAS</h1>
        <h4 style="color:#888; margin-top:-10px;">Monitoramento NFS-320 (Remoto)</h4>
        
        <div id="statusConexao" class="alerta-offline">🚨 ATENÇÃO: PERDA DE COMUNICAÇÃO COM O MÓDULO ESP32!</div>
        
        <div id="ev" class="tela-central">Conectando ao servidor em tempo real...</div>
        
        <p style="color:#666; font-size:12px;" id="txtStatus">Status: Sincronizando com a nuvem...</p>
        <hr style="border-color: #222;">
        
        <div class="btn" id="btnLog" onclick="toggleHistorico()">📜 VER HISTÓRICO REMOTO</div>
        <div class="log-container" id="logContainer">Aguardando dados...</div>
    </div>

    <script>
        const URL_BASE = "https://munitor-de-alarme-default-rtdb.firebaseio.com";
        
        const card = document.getElementById('mainCard');
        const evDiv = document.getElementById('ev');
        const logContainer = document.getElementById('logContainer');
        const txtStatus = document.getElementById('txtStatus');
        const divOffline = document.getElementById('statusConexao');

        let statusAtual = "NORMAL";
        let ultimoPingESP = Date.now();

        // --- CONEXÃO STREAM EM TEMPO REAL (Gasta menos banda e é instantâneo) ---
        function iniciarStreamRealtime() {
            const eventSource = new EventSource(`${URL_BASE}.json`);

            eventSource.addEventListener('put', function(e) {
                const json = JSON.parse(e.data);
                if (!json || !json.data) return;

                // O Firebase retorna a estrutura completa no primeiro push ou nós isolados nas mudanças
                const base = json.path === "/" ? json.data : json.data;
                const path = json.path;

                // Processamento inteligente dependendo de qual dado mudou no Firebase
                if (path === "/" || path === "") {
                    statusAtual = base.tipo_status || "NORMAL";
                    evDiv.innerText = base.status || "Aguardando evento...";
                    ultimoPingESP = Number(base.heartbeat || Date.now());
                    if (base.historico) atualizarHistoricoHTML(base.historico);
                } else if (path === "/status") {
                    evDiv.innerText = json.data;
                } else if (path === "/tipo_status") {
                    statusAtual = json.data;
                } else if (path === "/heartbeat") {
                    ultimoPingESP = Number(json.data);
                } else if (path.startsWith("/historico")) {
                    // Recarrega o histórico completo para garantir a ordenação se houver nova inserção
                    buscarHistoricoCompleto();
                }

                divOffline.style.display = "none";
                atualizarLayoutCores();
            });

            eventSource.onerror = function(err) {
                console.error("Erro na conexão Realtime:", err);
                evDiv.innerText = "FALHA DE SINCRONISMO\n(RECONECTANDO...)";
                evDiv.style.color = "#ff3333";
                card.style.borderTopColor = "#ff3333";
            };
        }

        function buscarHistoricoCompleto() {
            fetch(`${URL_BASE}/historico.json`)
                .then(r => r.json())
                .then(historico => {
                    if (historico) atualizarHistoricoHTML(historico);
                });
        }

        function atualizarHistoricoHTML(historico) {
            let logsHTML = "";
            // Inverte a ordem das chaves para exibir o evento mais recente sempre no TOPO
            Object.keys(historico).reverse().forEach((key) => {
                const logItem = historico[key];
                let prefixo = "> ";
                let mensagemFinal = "";
                
                if (logItem && typeof logItem === 'object') {
                    if(logItem.tipo === "FOGO") prefixo = "🚨 [ALARME] ";
                    if(logItem.tipo === "FALHA") prefixo = "⚠️ [FALHA] ";
                    mensagemFinal = logItem.mensagem || JSON.stringify(logItem);
                } else if (typeof logItem === 'string') {
                    if (logItem.toUpperCase().includes("FOGO")) prefixo = "🚨 [ALARME] ";
                    else if (logItem.toUpperCase().includes("FALHA")) prefixo = "⚠️ [FALHA] ";
                    mensagemFinal = logItem;
                }
                logsHTML += prefixo + mensagemFinal + "\n------------------------\n";
            });
            logContainer.innerText = logsHTML || "Nenhum histórico disponível.";
        }

        function atualizarLayoutCores() {
            txtStatus.innerText = "Status: Monitoramento Ativo | Classe: " + statusAtual;

            if (statusAtual === "FOGO") {
                evDiv.style.color = "#ff3333";
                card.style.borderTopColor = "#ff3333";
                card.style.animation = "piscar 0.8s infinite alternate";
                logContainer.style.color = "#ff3333";
            } else if (statusAtual === "FALHA") {
                evDiv.style.color = "#f1c40f";
                card.style.borderTopColor = "#f1c40f";
                card.style.animation = "none";
                logContainer.style.color = "#f1c40f";
            } else { // NORMAL
                evDiv.style.color = "#2ecc71";
                card.style.borderTopColor = "#2ecc71";
                card.style.animation = "none";
                logContainer.style.color = "#2ecc71";
            }
        }

        function toggleHistorico() {
            if (logContainer.style.display === "block") {
                logContainer.style.display = "none";
                document.getElementById('btnLog').innerText = "📜 VER HISTÓRICO REMOTO";
            } else {
                logContainer.style.display = "block";
                document.getElementById('btnLog').innerText = "🙈 OCULTAR HISTÓRICO";
                buscarHistoricoCompleto();
            }
        }

        // Watchdog executado em segundo plano a cada 5 segundos apenas para conferir a atividade da placa
        setInterval(() => {
            const tempoSemSinal = (Date.now() - ultimoPingESP) / 1000;
            if (tempoSemSinal > 35) {
                divOffline.style.display = "block";
                divOffline.innerText = "🚨 ALERTA: DISPOSITIVO OFFLINE HÁ " + Math.round(tempoSemSinal) + " SEGUNDOS!";
                evDiv.innerText = "SISTEMA DESCONECTADO\n(ESP32 RECEPTOR SEM WI-FI OU DESLIGADO)";
                evDiv.style.color = "#888";
                card.style.borderTopColor = "#555";
                card.style.animation = "none";
                txtStatus.innerText = "Status: Indisponível | Sem atividade de rede";
            }
        }, 5000);

        // Inicializa o Stream em Tempo Real
        iniciarStreamRealtime();
    </script>
</body>
</html>
