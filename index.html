<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Teste de Atualização</title>
    <style>
        body { font-family: monospace; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        .painel { background: #000; border: 2px solid #00a2ff; padding: 20px; display: inline-block; width: 90%; max-width: 500px; border-radius: 8px; margin-top: 50px; box-shadow: 0 4px 15px rgba(0,162,255,0.3); }
        .status-texto { font-size: 20px; color: #00a2ff; font-weight: bold; margin: 20px 0; white-space: pre-wrap; }
        .info-sub { font-size: 11px; color: #666; font-family: sans-serif; }
        .log-box { background: #050505; border: 1px solid #333; padding: 10px; height: 180px; overflow-y: scroll; text-align: left; font-size: 12px; color: #00a2ff; white-space: pre-wrap; margin-top: 15px; }
        /* NOVO: Estilo para a caixa indicadora do sinal do rádio */
        .caixa-sinal { background: #111; border: 1px solid #444; padding: 8px; margin: 15px 0; font-weight: bold; font-size: 13px; border-radius: 4px; display: inline-block; width: 80%; }
    </style>
</head>
<body>

    <div class="painel">
        <h2>TESTE DE ALTERAÇÃO OK</h2>
        <h5 style="color: #666; margin-top: -5px;">Varredura REST - CF Sistemas</h5>
        <hr style="border-color: #222;">
        
        <!-- NOVO: Elemento visual do Sinal LoRa na tela -->
        <div id="statusSinalLora" class="caixa-sinal" style="color: #aaa;">📶 SINAL LORA: VERIFICANDO...</div>

        <div id="msgCentral" class="status-texto">Conectando ao Firebase...</div>
        <p id="infoRede" class="info-sub">Iniciando busca de pacotes...</p>
        
        <h4 style="text-align: left; margin-bottom: 5px; color: #aaa;">📜 HISTÓRICO DE EVENTOS:</h4>
        <div id="logBox" class="log-box">Aguardando sincronismo...</div>
    </div>

    <script>
        const URL_REST = "https://firebaseio.com";

        function atualizarPainelSimples() {
            fetch(URL_REST)
                .then(res => {
                    if (!res.ok) throw new Error("Erro na requisição: " + res.status);
                    return res.json();
                })
                .then(data => {
                    if (!data) {
                        document.getElementById("msgCentral").innerText = "BANCO SEM DADOS";
                        document.getElementById("msgCentral").style.color = "#f1c40f";
                        return;
                    }

                    // Lógica para interpretar o texto atual e definir o status do rádio LoRa
                    const msgAtual = data.status || "";
                    const divSinal = document.getElementById("statusSinalLora");

                    if (msgAtual.includes("FALHA DE COMUNICACAO") || data.tipo_status === "DESCONECTADO") {
                        divSinal.innerText = "⚠️ SINAL LORA: LINK CAÍDO / FORA DE ALCANCE";
                        divSinal.style.color = "#ff3333";
                        divSinal.style.borderColor = "#ff3333";
                    } else if (msgAtual.includes("CENTRAL RECONECTADA") || msgAtual.includes("CENTRAL DESCONECTADA") || msgAtual.includes("REINICIANDO") || data.heartbeat) {
                        divSinal.innerText = "📶 SINAL LORA: CONECTADO E ATIVO";
                        divSinal.style.color = "#2ecc71";
                        divSinal.style.borderColor = "#2ecc71";
                    }

                    // Mostra o texto atual da Notifier enviado pelo ESP
                    document.getElementById("msgCentral").innerText = msgAtual || "Aguardando evento...";
                    
                    if (data.tipo_status === "FALHA") {
                        document.getElementById("msgCentral").style.color = "#f1c40f";
                    } else if (data.tipo_status === "FOGO") {
                        document.getElementById("msgCentral").style.color = "#ff3333";
                    } else {
                        document.getElementById("msgCentral").style.color = "#2ecc71";
                    }

                    document.getElementById("infoRede").innerText = "Conectado à nuvem externa com sucesso!";

                    if (data.historico) {
                        let stringLogs = "";
                        Object.keys(data.historico).slice(-15).forEach(key => {
                            const log = data.historico[key];
                            if (typeof log === 'string') {
                                stringLogs = "> " + log + "\n" + stringLogs;
                            } else if (log && log.mensagem) {
                                stringLogs = "> " + log.mensagem + "\n" + stringLogs;
                            }
                        });
                        document.getElementById("logBox").innerText = stringLogs;
                    }
                })
                .catch(err => {
                    console.error("Falha ao conectar:", err);
                    document.getElementById("msgCentral").innerText = "FALHA DE SINCRONISMO";
                    document.getElementById("msgCentral").style.color = "#ff3333";
                    document.getElementById("infoRede").innerText = "Aguardando liberação das regras de leitura no console.";
                });
        }

        atualizarPainelSimples();
        setInterval(atualizarPainelSimples, 3000);
    </script>
</body>
</html>
