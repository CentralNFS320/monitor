<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Remoto</title>
    <style>
        body { font-family: Arial; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 0; }
        .card { background: #333; padding: 20px; border-top: 5px solid #f00; display: inline-block; margin-top: 30px; width: 90%; max-width: 500px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #ev { font-size: 18px; margin: 20px 0; min-height: 50px; font-weight: bold; transition: all 0.3s; }
        .btn { display: inline-block; margin-top: 20px; color: #0af; text-decoration: none; font-weight: bold; border: 1px solid #0af; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <h1>CF SISTEMAS</h1>
        <h3>Monitoramento NFS-320</h3>
        <div id="ev">Carregando...</div>
        <hr>
        <a href="historico.html" class="btn">📜 VER HISTÓRICO</a>
    </div>

    <script>
        const AUTH_TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa; // VOCÊ DEVE TROCAR ISSO
        const V_PIN = "V1"; 

        function atualizarStatus() {
            fetch(`https://blynk.cloud{AUTH_TOKEN}&${V_PIN}`)
                .then(response => response.text())
                .then(data => {
                    const el = document.getElementById('ev');
                    el.innerText = data;
                    
                    // Lógica de cores
                    if (data.includes("FOGO")) {
                        el.style.color = "#ff0000";
                        el.style.animation = "blink 1s infinite";
                    } else if (data.includes("ALARME")) {
                        el.style.color = "#ff8c00";
                        el.style.animation = "none";
                    } else {
                        el.style.color = "#2ecc71";
                        el.style.animation = "none";
                    }
                });
        }
        setInterval(atualizarStatus, 2000);
        atualizarStatus();
    </script>
</body>
</html>
