<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Sincronismo OK</title>
    <style>
        body { font-family: monospace; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        .painel { background: #000; border: 2px solid #2ecc71; padding: 20px; display: inline-block; width: 90%; max-width: 500px; border-radius: 8px; margin-top: 50px; box-shadow: 0 4px 15px rgba(46,204,113,0.3); }
        .status-texto { font-size: 20px; color: #2ecc71; font-weight: bold; margin: 20px 0; white-space: pre-wrap; }
        .info-sub { font-size: 11px; color: #666; font-family: sans-serif; }
        .log-box { background: #050505; border: 1px solid #333; padding: 10px; height: 180px; overflow-y: scroll; text-align: left; font-size: 12px; color: #2ecc71; white-space: pre-wrap; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="painel">
        <h2>CF SISTEMAS - LEITURA HTTP REST</h2>
        <h5 style="color: #666; margin-top: -5px;">Varredura por requisição direta</h5>
        <hr style="border-color: #222;">
        
        <div id="msgCentral" class="status-texto">Iniciando Varredura...</div>
        <p id="infoRede" class="info-sub">Conectando ao banco...</p>
        
        <h4 style="text-align: left; margin-bottom: 5px; color: #aaa;">📜 ÚLTIMOS EVENTOS:</h4>
        <div id="logBox" class="log-box">Aguardando dados...</div>
    </div>

    <script>
        // Chave de API extraída do seu bloco de notas oficial do Firebase
        const API_KEY = "AIzaSyDXqeZodkk0PaTeVvsQZCY410ymNca2xQE";

        // Rotas de teste automáticas (Cobre "munitor" com U e "monitor" com O)
        const ROTAS = [
            `https://firebaseio.com{API_KEY}`,
            `https://firebaseio.com{API_KEY}`,
            `https://firebaseio.com{API_KEY}`,
            `https://firebaseio.com{API_KEY}`
        ];

        let indiceRotaAtual = 0;

        function varrerBancoFirebase() {
            const urlAlvo = ROTAS[indiceRotaAtual];
            
            fetch(urlAlvo)
                .then(res => {
                    if (!res.ok) throw new Error("Erro HTTP: " + res.status);
                    return res.json();
                })
                .then(data => {
                    const msgCentral = document.getElementById("msgCentral");
                    const infoRede = document.getElementById("infoRede");
                    const logBox = document.getElementById("logBox");

                    if (!data) {
                        msgCentral.innerText = "BANCO DE DADOS VAZIO";
                        msgCentral.style.color = "#f1c40f";
                        infoRede.innerText = "Conectado! Aguardando o primeiro reset da placa central.";
                        return;
                    }

                    // Se a resposta vier envelopada na chave 'central' ou direta na raiz
                    let base = data.central ? data.central : data;

                    // Captura e exibe as strings enviadas pelo ESP32
                    const stringStatus = base.status || base.mensagem || "Aguardando sinal da central...";
                    msgCentral.innerText = stringStatus;

                    const classeStatus = base.tipo_status || base.tipo || "NORMAL";
                    if (classeStatus === "FALHA") {
                        msgCentral.style.color = "#f1c40f";
                    } else if (classeStatus === "FOGO") {
                        msgCentral.style.color = "#ff3333";
                    } else {
                        msgCentral.style.color = "#2ecc71";
                    }

                    infoRede.innerText = "Sincronizado! Comunicação ativa na rota: " + indiceRotaAtual;

                    // Monta o histórico de logs
                    if (base.historico) {
                        let txtLogs = "";
                        Object.keys(base.historico).slice(-15).forEach(key => {
                            const item = base.historico[key];
                            if (typeof item === 'string') {
                                txtLogs = "> " + item + "\n" + txtLogs;
                            } else if (item && item.mensagem) {
                                txtLogs = "> " + item.mensagem + "\n" + txtLogs;
                            }
                        });
                        logBox.innerText = txtLogs;
                    }
                })
                .catch(err => {
                    console.warn(`Falha na rota ${indiceRotaAtual}, testando próxima...`);
                    
                    // Fica alternando as URLs até achar qual delas o Google aceita
                    indiceRotaAtual = (indiceRotaAtual + 1) % ROTAS.length;

                    document.getElementById("msgCentral").innerText = "BUSCANDO ROTA REMOTA";
                    document.getElementById("msgCentral").style.color = "#f1c40f";
                    document.getElementById("infoRede").innerText = "Sincronizando portas de rede do Firebase...";
                });
        }

        // Inicia a execução e varre a cada 3 segundos
        varrerBancoFirebase();
        setInterval(varrerBancoFirebase, 3000);
    </script>
</body>
</html>
