<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CF SISTEMAS - MONITOR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* O QUADRO COM EFEITO DE BAIXO RELEVO */
        .painel-industrial {
            width: 85%;
            max-width: 550px;
            padding: 40px;
            border-radius: 10px;
            background-color: #1a1a1a; /* Cor de fundo do painel */
            border: 2px solid #333;
            box-shadow: inset 0 0 15px rgba(0,0,0,1), 0 5px 15px rgba(0,0,0,0.5);
            text-align: center;
            transition: background-color 0.4s ease;
        }

        h1 {
            color: #0af;
            font-size: 22px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* TEXTO DENTRO DO QUADRO */
        .status-display {
            font-size: 32px;
            font-weight: 900;
            padding: 30px;
            border-radius: 5px;
            background-color: #222; /* Fundo interno inicial */
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8); /* Efeito de profundidade */
            color: #444; /* Letras escuras por padrão */
            text-transform: uppercase;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CORES ESTÁTICAS (IGUAL AO PRIMEIRO PROGRAMA) */
        .fundo-alarme { 
            background-color: #D32F2F !important; /* Vermelho Escuro */
            color: #300 !important; /* Letras em Vermelho Muito Escuro */
        }

        .fundo-falha { 
            background-color: #FBC02D !important; /* Amarelo Industrial */
            color: #440 !important; /* Letras em Marrom/Amarelo Escuro */
        }

        .fundo-normal { 
            background-color: #388E3C !important; /* Verde Industrial */
            color: #020 !important; /* Letras em Verde Escuro */
        }

        .btn-link {
            display: inline-block;
            margin-top: 30px;
            color: #555;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="painel-industrial">
        <h1>CF SISTEMAS</h1>
        <div id="display" class="status-display">
            Sincronizando...
        </div>
        <a href="historico.html" class="btn-link">Rastreador de Eventos</a>
    </div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";

        async function atualizar() {
            const url = `https://blynk.cloud/external/api/get?token=${TOKEN}&V1&_=${Date.now()}`;
            
            try {
                const response = await fetch(url);
                const textoPuro = await response.text();
                let msg = textoPuro.replace(/[\[\]"{}]/g, "").replace("V1:", "").trim();
                
                if(!msg || msg === "null") msg = "SISTEMA NORMAL";

                const display = document.getElementById("display");
                display.innerText = msg;

                let m = msg.toUpperCase();

                // REMOVE TODAS AS CLASSES ANTES DE APLICAR A NOVA
                display.classList.remove("fundo-alarme", "fundo-falha", "fundo-normal");

                // LÓGICA DE CORES ESTÁTICAS E LETRAS ESCURAS
                if (m.includes("FIRE") || m.includes("ALARM") || m.includes("FOGO") || m.includes("INCENDIO")) {
                    display.classList.add("fundo-alarme");
                } 
                else if (m.includes("FAULT") || m.includes("FALHA") || m.includes("TROUBLE") || m.includes("AVARIA") || m.includes("PROBL") || m.includes("LPR")) {
                    display.classList.add("fundo-falha");
                }
                else if (m.includes("NORMAL") || m.includes("RESET")) {
                    display.classList.add("fundo-normal");
                }

            } catch (error) {
                console.error("Erro de conexão");
            }
        }

        setInterval(atualizar, 1500);
        atualizar();
    </script>
</body>
</html>
