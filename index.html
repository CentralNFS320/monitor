<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitoramento Remoto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
        }
        .card {
            background: #333;
            padding: 20px;
            border-top: 5px solid #0af;
            display: inline-block;
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: border-color 0.5s ease;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            color: #0af;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0af;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .log-container {
            background: #000;
            border: 1px solid #444;
            padding: 10px;
            height: 250px;
            overflow-y: scroll;
            text-align: left;
            white-space: pre-wrap;
            font-family: monospace;
            color: #0f0;
            margin-top: 15px;
            display: none;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>CF SISTEMAS</h1>
        <h3>Monitoramento NFS-320 (Remoto)</h3>
        
        <div id="ev" style="font-size:18px; color:#2ecc71; margin:20px 0; min-height:50px; font-weight:bold;">
            Conectando ao Firebase...
        </div>
        
        <p style="color:#888; font-size:12px;">Status: Monitoramento Global Ativo</p>
        <hr>
        
        <div class="btn" id="btnLog" onclick="toggleHistorico()">📜 VER HISTÓRICO REMOTO</div>
        <div class="log-container" id="logContainer">Carregando histórico da nuvem...</div>
    </div>

    <!-- Bibliotecas de Conexão com o Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // --- CONFIGURAÇÃO DO SEU PROJETO NO FIREBASE ---
        const firebaseConfig = {
            apiKey: "COLE_AQUI_SUA_CHAVE_DE_API", // <-- Cole aqui a Chave da engrenagem ⚙️
            databaseURL: "https://firebaseio.com"
        };

        // Inicialização
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const card = document.getElementById('mainCard');
        const evDiv = document.getElementById('ev');
        const logContainer = document.getElementById('logContainer');

        // Escuta o status atual modificado pelo ESP32
        database.ref('/central/status').on('value', (snapshot) => {
            const msg = snapshot.val() || "Aguardando Notifier...";
            evDiv.innerText = msg;

            // Lógica dinâmica de cores mantida igual ao seu projeto original
            if (msg.includes("FOGO") || msg.includes("incendio")) {
                evDiv.style.color = "#ff0000";
                evDiv.style.animation = "blink 1s infinite";
                card.style.borderTopColor = "#ff0000";
            } else if (msg.includes("ALARME") || msg.includes("Alarm")) {
                evDiv.style.color = "#ff8c00";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#ff8c00";
            } else if (msg.includes("FALHA") || msg.includes("falha")) {
                evDiv.style.color = "#f1c40f";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#f1c40f";
            } else {
                evDiv.style.color = "#2ecc71";
                evDiv.style.animation = "none";
                card.style.borderTopColor = "#2ecc71";
            }
        });

        // Atualiza a lista de histórico na tela
        database.ref('/central/historico').limitToLast(60).on('value', (snapshot) => {
            let logsHTML = "";
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                logsHTML += > ${data.mensagem}\n;
            });
            logContainer.innerText = logsHTML || "Sem novos logs registrados na nuvem.";
            logContainer.scrollTop = logContainer.scrollHeight;
        });

        // Função do botão para abrir e fechar o histórico
        function toggleHistorico() {
            if (logContainer.style.display === "block") {
                logContainer.style.display = "none";
                document.getElementById('btnLog').innerText = "📜 VER HISTÓRICO REMOTO";
            } else {
                logContainer.style.display = "block";
                document.getElementById('btnLog').innerText = "⬅️ FECHAR HISTÓRICO";
            }
        }
    </script>
</body>
</html>
