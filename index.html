<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Leitura Bruta</title>
    <style>
        body { font-family: monospace; background: #121212; color: #e0e0e0; padding: 20px; text-align: left; }
        .painel { background: #000; border: 2px solid #ff00ea; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(255,0,234,0.2); max-width: 600px; margin: 0 auto; }
        .dados-brutos { background: #050505; border: 1px solid #333; padding: 15px; color: #0f0; white-space: pre-wrap; font-size: 13px; height: 300px; overflow-y: scroll; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="painel">
        <!-- TÍTULO NOVO PARA CONFIRMAR ATUALIZAÇÃO VISUAL -->
        <h2 style="color: #ff00ea; text-align: center;">MODO DE INSPEÇÃO ATIVO</h2>
        <p style="font-size: 11px; color: #666; text-align: center;">Buscando estrutura crua do JSON...</p>
        <hr style="border-color: #222;">
        
        <div id="statusRede" style="font-weight: bold; text-align: center;">Aguardando resposta da nuvem...</div>
        
        <h4>📦 CONTEÚDO REAL DO SEU BANCO DE DADOS:</h4>
        <div id="jsonDisplay" class="dados-brutos">Carregando estrutura...</div>
    </div>

    <script>
        // Testando a raiz inteira do banco para ver a pasta /central criada pelo ESP
        const URL_DEBUG = "https://firebaseio.com";

        function inspecionarBanco() {
            fetch(URL_DEBUG)
                .then(res => {
                    if (!res.ok) throw new Error("Erro na rede. Código HTTP: " + res.status);
                    return res.json();
                })
                .then(data => {
                    const statusDiv = document.getElementById("statusRede");
                    const displayDiv = document.getElementById("jsonDisplay");

                    if (data === null) {
                        statusDiv.innerText = "✅ CONECTADO! Mas o seu banco está totalmente vazio.";
                        statusDiv.style.color = "#f1c40f";
                        displayDiv.innerText = "Nenhuma chave encontrada na nuvem.";
                        return;
                    }

                    statusDiv.innerText = "🚀 SUCESSO! Banco de dados lido com sucesso.";
                    statusDiv.style.color = "#2ecc71";
                    
                    // Despeja a estrutura real e as letras como o ESP salvou na nuvem
                    displayDiv.innerText = JSON.stringify(data, null, 4);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("statusRede").innerText = "❌ ERRO DE CONEXÃO";
                    document.getElementById("statusRede").style.color = "#ff3333";
                    document.getElementById("jsonDisplay").innerText = err.message + "\n\nVerifique se o banco de dados foi excluído ou se a aba de Regras (Rules) bloqueou a leitura anônima.";
                });
        }

        // Executa imediatamente e varre a cada 4 segundos
        inspecionarBanco();
        setInterval(inspecionarBanco, 4000);
    </script>
</body>
</html>
