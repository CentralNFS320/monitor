<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CF SISTEMAS - MONITOR</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center;
        }

        /* IDENTIFICAÇÃO EM BRANCO FORA DO QUADRO */
        .identificacao {
            color: #fff;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .container { width: 90%; max-width: 500px; }
        
        /* QUADRO DE STATUS COM REFLEXO (GLOW) */
        .card {
            background: #111;
            padding: 50px 20px;
            border-radius: 15px;
            border: 2px solid #222;
            transition: 0.5s;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #status-texto { 
            font-size: 32px; 
            font-weight: 900; 
            text-transform: uppercase;
        }

        /* --- MODO ALARME: VERMELHO ESCURO COM REFLEXO --- */
        .alarme-on {
            background-color: #D32F2F !important; /* Vermelho mais escuro */
            border-color: #B71C1C !important;
            box-shadow: 0 0 50px #D32F2F; /* Reflexo luminoso em volta */
        }
        
        .alarme-on #status-texto {
            color: #300 !important; /* Letras no tom do vermelho escuro (quase preto) */
        }

        /* --- MODO FALHA: AMARELO INDUSTRIAL --- */
        .falha-on {
            background-color: #FBC02D !important;
            box-shadow: 0 0 40px #FBC02D;
        }
        .falha-on #status-texto {
            color: #440 !important; /* Letras escuras no amarelo */
        }

        /* --- MODO NORMAL: VERDE --- */
        .normal-on {
            background-color: #388E3C !important;
            box-shadow: 0 0 30px #388E3C;
        }
        .normal-on #status-texto {
            color: #020 !important; /* Letras escuras no verde */
        }

        .btn-link {
            display: inline-block; margin-top: 40px; padding: 10px 20px;
            color: #555; text-decoration: none; font-size: 12px;
            border: 1px solid #222; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="identificacao">CF SISTEMAS</div>
        
        <div id="painel" class="card">
            <div id="status-texto">CARREGANDO...</div>
        </div>

        <a href="historico.html" class="btn-link">RASTREADOR DE EVENTOS</a>
    </div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";

        function atualizar() {
            // Adicionado timestamp no final para forçar a atualização a cada 3s
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V1&_=${Date.now()}`)
                .then(r => r.text())
                .then(data => {
                    let msg = data.replace(/[\[\]"{}]/g, "").replace("V1:", "").trim();
                    if (!msg || msg === "null") msg = "SISTEMA NORMAL";

                    const texto = document.getElementById('status-texto');
                    const painel = document.getElementById('painel');
                    texto.innerText = msg;

                    let m = msg.toUpperCase();

                    // Limpa classes anteriores
                    painel.className = "card";

                    // Lógica de Cores com Letras Escuras e Reflexo
                    if (m.includes("FIRE") || m.includes("ALARM") || m.includes("FOGO") || m.includes("INCENDIO")) {
                        painel.classList.add("alarme-on");
                    } 
                    else if (m.includes("FAULT") || m.includes("FALHA") || m.includes("TROUBLE") || m.includes("AVARIA") || m.includes("PROBL") || m.includes("LPR")) {
                        painel.classList.add("falha-on");
                    }
                    else if (m.includes("NORMAL") || m.includes("RESET")) {
                        painel.classList.add("normal-on");
                    }
                });
        }

        // ATUALIZAÇÃO EXATA A CADA 3 SEGUNDOS (3000ms)
        setInterval(atualizar, 3000);
        atualizar();
    </script>
</body>
</html>
