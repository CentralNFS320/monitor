<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitoramento</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* VOLTANDO AO LAYOUT ANTERIOR QUE VOCÊ GOSTA */
        .status-card {
            background: #1a1a1a;
            padding: 40px 20px;
            border-radius: 20px;
            margin-top: 50px;
            /* Efeito Inset solicitado */
            box-shadow: inset 4px 4px 10px #000, 5px 5px 20px rgba(0,0,0,0.5);
            border-top: 6px solid #00ff7f; /* Borda de 6px */
            transition: 0.3s;
        }

        #status-texto { font-size: 28px; font-weight: bold; margin: 10px 0; } /* Fonte grande */
        #ultima-msg { font-size: 14px; color: #888; font-family: monospace; }

        .btn-link {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 30px;
            background: #222;
            color: #0af;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CF SISTEMAS</h1>
        <p style="color: #444;">MONITORAMENTO NFS-320</p>

        <div id="cartao" class="status-card">
            <div id="status-texto">SINCRONIZANDO...</div>
            <div id="ultima-msg">Aguardando dados...</div>
        </div>

        <a href="historico.html" class="btn-link">VER HISTÓRICO COMPLETO</a>
    </div>

    <script>
        const AUTH_TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        
        function atualizarPainel() {
            // CORREÇÃO PARA NÃO VIR FOGO DO CACHE: Adicionamos um número aleatório na URL
            const nocache = "&_=" + new Date().getTime();
            const urlV1 = `https://blynk.cloud/external/api/get?token=${AUTH_TOKEN}&V1${nocache}`;
            const urlV2 = `https://blynk.cloud/external/api/get?token=${AUTH_TOKEN}&V2${nocache}`;

            // Puxa o Status (V1) para mudar a cor
            fetch(urlV1).then(r => r.text()).then(status => {
                const cartao = document.getElementById('cartao');
                const texto = document.getElementById('status-texto');
                
                texto.innerText = status;
                let s = status.toUpperCase();

                // Lógica de Cores Sensível a qualquer variação
                if(s.includes("FIRE") || s.includes("ALARM") || s.includes("FOGO")) {
                    cartao.style.borderTopColor = "#ff0000"; // Vermelho
                    texto.style.color = "#ff0000";
                } 
                else if(s.includes("FAULT") || s.includes("FALHA")) {
                    cartao.style.borderTopColor = "#ffcc00"; // Amarelo
                    texto.style.color = "#ffcc00";
                }
                else {
                    cartao.style.borderTopColor = "#00ff7f"; // Verde OK
                    texto.style.color = "#00ff7f";
                }
            });

            // Puxa a mensagem detalhada (V2)
            fetch(urlV2).then(r => r.text()).then(msg => {
                if(msg.length > 3) {
                    document.getElementById('ultima-msg').innerText = "DETALHE: " + msg;
                }
            });
        }

        // Atualiza a cada 2 segundos
        setInterval(atualizarPainel, 2000);
        atualizarPainel();
    </script>
</body>
</html>
