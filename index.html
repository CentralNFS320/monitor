<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Varredura HTTP</title>
    <style>
        body { font-family: monospace; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        .painel { background: #000; border: 2px solid #2ecc71; padding: 20px; display: inline-block; width: 90%; max-width: 500px; border-radius: 8px; margin-top: 50px; box-shadow: 0 4px 15px rgba(46,204,113,0.3); }
        .status-texto { font-size: 20px; color: #2ecc71; font-weight: bold; margin: 20px 0; white-space: pre-wrap; }
        .info-sub { font-size: 11px; color: #666; font-family: sans-serif; }
        .log-box { background: #050505; border: 1px solid #333; padding: 10px; height: 180px; overflow-y: scroll; text-align: left; font-size: 12px; color: #2ecc71; white-space: pre-wrap; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="painel">
        <!-- TÍTULO ATUALIZADO: SE MUDAR PARA ESSE, O GITHUB ATUALIZOU -->
        <h2>CF SISTEMAS - LEITURA HTTP REST</h2>
        <h5 style="color: #666; margin-top: -5px;">Varredura por requisição direta</h5>
        <hr style="border-color: #222;">
        
        <div id="msgCentral" class="status-texto">Iniciando Varredura...</div>
        <p id="infoRede" class="info-sub">Conectando ao banco...</p>
        
        <h4 style="text-align: left; margin-bottom: 5px; color: #aaa;">📜 ÚLTIMOS EVENTOS:</h4>
        <div id="logBox" class="log-box">Aguardando dados...</div>
    </div>

    <script>
        // URL 100% direta e cravada para ler a raiz do seu banco de dados
        const URL_REST_DIRETA = "https://firebaseio.com";

        function atualizarViaREST() {
            fetch(URL_REST_DIRETA)
                .then(res => {
                    if (!res.ok) throw new Error("Erro de rede. Código: " + res.status);
                    return res.json();
                })
                .then(data => {
                    const msgCentral = document.getElementById("msgCentral");
                    const infoRede = document.getElementById("infoRede");
                    const logBox = document.getElementById("logBox");

                    // Se o banco de dados retornar completamente vazio
                    if (!data) {
                        msgCentral.innerText = "BANCO DE DADOS VAZIO";
                        msgCentral.style.color = "#f1c40f";
                        infoRede.innerText = "Conectado à nuvem! Dê um RESET no ESP8266 para gravar os dados.";
                        logBox.innerText = "Nenhum histórico encontrado no banco.";
                        return;
                    }

                    // Se o seu ESP32 estiver gravando dentro de uma pasta chamada 'central' ou na raiz
                    let baseDados = data.central ? data.central : data;

                    // 1. Atualiza o visor principal da tela
                    const mensagemStatus = baseDados.status || baseDados.mensagem || "Aguardando sinal da central...";
                    msgCentral.innerText = mensagemStatus;

                    // Define as cores dinamicamente
                    const tipoStatus = baseDados.tipo_status || baseDados.tipo || "NORMAL";
                    if (tipoStatus === "FALHA") {
                        msgCentral.style.color = "#f1c40f";
                    } else if (tipoStatus === "FOGO") {
                        msgCentral.style.color = "#ff3333";
                    } else {
                        msgCentral.style.color = "#2ecc71";
                    }

                    infoRede.innerText = "Sincronizado! Dados recebidos com sucesso da nuvem.";

                    // 2. Renderiza a lista de logs do histórico
                    if (baseDados.historico) {
                        let stringLogs = "";
                        Object.keys(baseDados.historico).slice(-15).forEach(key => {
                            const logItem = baseDados.historico[key];
                            if (typeof logItem === 'string') {
                                stringLogs = "> " + logItem + "\n" + stringLogs;
                            } else if (logItem && logItem.mensagem) {
                                stringLogs = "> " + logItem.mensagem + "\n" + stringLogs;
                            }
                        });
                        logBox.innerText = stringLogs;
                    }
                })
                .catch(err => {
                    console.error("Erro na varredura:", err);
                    document.getElementById("msgCentral").innerText = "ERRO DE COMUNICAÇÃO";
                    document.getElementById("msgCentral").style.color = "#ff3333";
                    document.getElementById("infoRede").innerText = "Falha ao puxar JSON. Verifique se as Regras (Rules) do Firebase estão públicas (true).";
                });
        }

        // Executa na hora e cria o timer de varredura a cada 3 segundos
        atualizarViaREST();
        setInterval(atualizarViaREST, 3000);
    </script>
</body>
</html>
