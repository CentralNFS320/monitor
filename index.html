<script>
    const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
    const URL_API = `https://blynk.cloud/external/api/get?token=${TOKEN}&V1`;

    function atualizar() {
        fetch(`${URL_API}&_=${new Date().getTime()}`)
            .then(r => r.text())
            .then(data => {
                // Limpeza agressiva: remove aspas, colchetes, chaves e o prefixo V1
                let msg = data.replace(/[\[\]"{}]/g, "").replace(/^V1:/, "").trim();

                if (!msg || msg === "null" || msg === "") return; // Ignora se vier vazio

                const texto = document.getElementById('status-texto');
                const cartao = document.getElementById('cartao');

                texto.innerText = msg;
                let mU = msg.toUpperCase();

                // RESET DE CLASSES
                cartao.classList.remove("alarme-ativo");
                
                // CRITÉRIOS DE COR
                if (mU.includes("FIRE") || mU.includes("FOGO") || mU.includes("ALARM")) {
                    cartao.style.borderTopColor = "#f00";
                    texto.style.color = "#f00";
                    cartao.classList.add("alarme-ativo");
                } 
                else if (mU.includes("PROBL") || mU.includes("FAULT") || mU.includes("FALHA") || mU.includes("TROUBLE")) {
                    cartao.style.borderTopColor = "#ff0"; // AMARELO
                    texto.style.color = "#ff0";
                } 
                else {
                    cartao.style.borderTopColor = "#0f7"; // VERDE (NORMAL)
                    texto.style.color = "#0f7";
                }
            });
    }
    setInterval(atualizar, 1500); // Atualiza rápido para pegar a troca de mensagens
</script>
