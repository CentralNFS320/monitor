<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Real Time</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; text-align: center; padding: 20px; }
        .card {
            background: #151515; padding: 50px 20px; border-radius: 20px; margin: 30px auto;
            max-width: 500px; border-top: 10px solid #0f7; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #status-texto { font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .alarme { border-top-color: #f00 !important; color: #f00 !important; }
        .falha { border-top-color: #ff0 !important; color: #ff0 !important; }
    </style>
</head>
<body>
    <h1 style="color:#0af">CF SISTEMAS</h1>
    <div id="cartao" class="card">
        <div id="status-texto">CONECTANDO...</div>
    </div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        let ultimaMsg = "";

        function atualizar() {
            // Buscamos o V1 (Status da Central)
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V1&_=${Date.now()}`)
                .then(r => r.text())
                .then(data => {
                    let msg = data.replace(/[\[\]"{}]/g, "").replace("V1:", "").trim();
                    if (!msg || msg === "null" || msg === "") msg = "SISTEMA NORMAL";
                    
                    if (msg === ultimaMsg) return; // Não faz nada se a msg for a mesma
                    ultimaMsg = msg;

                    const txt = document.getElementById('status-texto');
                    const card = document.getElementById('cartao');
                    txt.innerText = msg;

                    let m = msg.toUpperCase();
                    card.className = "card";

                    // Detecção de ALARME
                    if (m.includes("FIRE") || m.includes("ALARM") || m.includes("FOGO")) {
                        card.classList.add("alarme");
                    }
                    // Detecção de FALHAS (Incluindo PROBL, LPR, ABERTO que você viu)
                    else if (m.includes("PROBL") || m.includes("ABERTO") || m.includes("LPR") || m.includes("FALHA") || m.includes("FAULT")) {
                        card.classList.add("falha");
                    } else {
                        txt.style.color = "#0f7";
                    }
                });
        }
        // Atualiza a cada 1 segundo para pegar a alternância de mensagens da central
        setInterval(atualizar, 1000);
        atualizar();
    </script>
</body>
</html>
