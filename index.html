<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF SISTEMAS - Monitoramento Remoto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-top: 5px solid #2ecc71;
            display: inline-block;
            margin-top: 30px;
            width: 95%;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            transition: all 0.4s ease;
        }
        .tela-central {
            font-family: 'Courier New', Courier, monospace;
            background: #050505;
            color: #2ecc71;
            padding: 15px;
            text-align: left;
            font-size: 16px;
            line-height: 1.4;
            border-radius: 6px;
            border: 1px solid #333;
            white-space: pre-wrap;
            min-height: 80px;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin: 20px 0;
            transition: color 0.3s ease;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            color: #0af;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0af;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            user-select: none;
        }
        .btn:hover {
            background: rgba(0, 170, 255, 0.1);
        }
        .log-container {
            background: #000;
            border: 1px solid #333;
            padding: 12px;
            height: 300px;
            overflow-y: scroll;
            text-align: left;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            color: #2ecc71;
            margin-top: 15px;
            display: none;
            font-size: 13px;
        }
        .alerta-offline {
            background: #721c24;
            color: #f8d7da;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
            border: 1px solid #f5c6cb;
        }
        @keyframes piscar {
            0% { box-shadow: 0 0 5px #ff3333; background: #1e1e1e; }
            100% { box-shadow: 0 0 25px #ff3333; background: #2a0000; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>CF SISTEMAS</h1>
        <h4 style="color:#888; margin-top:-10px;">Monitoramento NFS-320 (Remoto)</h4>
        
        <div id="statusConexao" class="alerta-offline">🚨 ATENÇÃO: PERDA DE COMUNICAÇÃO COM O MÓDULO ESP32!</div>
        
        <div id="ev" class="tela-central">Sincronizando banco de dados...</div>
        
        <p style="color:#666; font-size:12px;" id="txtStatus">Status: Conectando com a nuvem...</p>
        <p style="color:#0af; font-size:13px; font-weight:bold; margin-top:-5px;" id="txtSinal">Sinal LoRa: Verificando...</p>
        <hr style="border-color: #222;">
        
        <div class="btn" id="btnLog" onclick="toggleHistorico()">📜 VER HISTÓRICO REMOTO</div>
        <div class="log-container" id="logContainer">Aguardando dados...</div>
    </div>

    <script>
        // URL definida exatamente como você especificou, sem barras ou nós no final
        const URL_BASE = "https://munitor-de-alarme-default-rtdb.firebaseio.com";
        
        const card = document.getElementById('mainCard');
        const evDiv = document.getElementById('ev');
        const logContainer = document.getElementById('logContainer');
        const txtStatus = document.getElementById('txtStatus');
        const txtSinal = document.getElementById('txtSinal');
        const divOffline = document.getElementById('statusConexao');

        let statusAtual = "NORMAL";
        let ultimoPingESP = Date.now();
        let usandoStream = true;

        // Função de consulta via requisição HTTP tradicional (Plano B de segurança)
        function consultarPainelTradicional() {
            fetch(`${URL_BASE}/central.json`)
                .then(r => { if (!r.ok) throw new Error(); return r.json(); })
                .then(data => {
                    if (!data) return;
                    processarDadosFirebase(data);
                })
                .catch(() => {
                    evDiv.innerText = "FALHA DE CONEXÃO COM O BANCO";
                    evDiv.style.color = "#ff3333";
                    card.style.borderTopColor = "#ff3333";
                });
        }

        // Processa as informações trazidas do Firebase e atualiza o layout
        function processarDadosFirebase(data) {
            statusAtual = data.tipo_status || "NORMAL";
            evDiv.innerText = data.status || data.mensagem || "Aguardando evento...";
            txtSinal.innerText = "Sinal LoRa: " + (data.sinal_lora || "SEM SINAL");
            ultimoPingESP = Number(data.heartbeat || Date.now());
            divOffline.style.display = "none";
            atualizarLayoutCores();
            if (data.historico) atualizarHistoricoHTML(data.historico);
        }
        // --- MOTOR DE STREAM EM TEMPO REAL ---
        function iniciarStreamRealtime() {
            // A barra final antes do .json resolve a trava de leitura do servidor do Firebase
            const eventSource = new EventSource(`${URL_BASE}/central/.json`);

            eventSource.addEventListener('put', function(e) {
                const json = JSON.parse(e.data);
                if (!json) return;

                const path = json.path;
                const data = json.data;

                if (path === "/" || path === "") {
                    if (data) processarDadosFirebase(data);
                } else if (path === "/status") {
                    evDiv.innerText = data;
                } else if (path === "/tipo_status") {
                    statusAtual = data;
                } else if (path === "/sinal_lora") {
                    txtSinal.innerText = "Sinal LoRa: " + data;
                } else if (path === "/heartbeat") {
                    ultimoPingESP = Number(data);
                } else if (path.startsWith("/historico")) {
                    buscarHistoricoCompleto();
                }

                divOffline.style.display = "none";
                atualizarLayoutCores();
            });

            eventSource.onerror = function() {
                // Se der erro no Stream, ativa de forma transparente o pooling tradicional para garantir o funcionamento
                if (usandoStream) {
                    console.log("Stream indisponível. Mudando para consultas HTTP tradicionais...");
                    usandoStream = false;
                    eventSource.close();
                    setInterval(consultarPainelTradicional, 3000);
                }
            };
        }

        function buscarHistoricoCompleto() {
            fetch(`${URL_BASE}/central/historico.json`)
                .then(r => r.json())
                .then(historico => {
                    if (historico) atualizarHistoricoHTML(historico);
                });
        }

        function atualizarHistoricoHTML(historico) {
            let logsHTML = "";
            Object.keys(historico).reverse().forEach((key) => {
                const logItem = historico[key];
                let prefixo = "> ";
                let mensagemFinal = "";
                
                if (logItem && typeof logItem === 'object') {
                    if(logItem.tipo === "FOGO") prefixo = "🚨 [ALARME] ";
                    if(logItem.tipo === "FALHA") prefixo = "⚠️ [FALHA] ";
                    mensagemFinal = logItem.mensagem || JSON.stringify(logItem);
                } else if (typeof logItem === 'string') {
                    if (logItem.toUpperCase().includes("FOGO")) prefixo = "🚨 [ALARME] ";
                    else if (logItem.toUpperCase().includes("FALHA")) prefixo = "⚠️ [FALHA] ";
                    mensagemFinal = logItem;
                }
                logsHTML += prefixo + mensagemFinal + "\n------------------------\n";
            });
            logContainer.innerText = logsHTML || "Nenhum histórico disponível.";
        }

        function atualizarLayoutCores() {
            txtStatus.innerText = "Status: Monitoramento Ativo | Classe: " + statusAtual;

            if (statusAtual === "FOGO") {
                evDiv.style.color = "#ff3333";
                card.style.borderTopColor = "#ff3333";
                card.style.animation = "piscar 0.8s infinite alternate";
                logContainer.style.color = "#ff3333";
            } else if (statusAtual === "FALHA") {
                evDiv.style.color = "#f1c40f";
                card.style.borderTopColor = "#f1c40f";
                card.style.animation = "none";
                logContainer.style.color = "#f1c40f";
            } else { // NORMAL
                evDiv.style.color = "#2ecc71";
                card.style.borderTopColor = "#2ecc71";
                card.style.animation = "none";
                logContainer.style.color = "#2ecc71";
            }
        }

        function toggleHistorico() {
            if (logContainer.style.display === "block") {
                logContainer.style.display = "none";
                document.getElementById('btnLog').innerText = "📜 VER HISTÓRICO REMOTO";
            } else {
                logContainer.style.display = "block";
                document.getElementById('btnLog').innerText = "🙈 OCULTAR HISTÓRICO";
                buscarHistoricoCompleto();
            }
        }

        // Watchdog de atividade do ESP32 executado a cada 5 segundos
        setInterval(() => {
            const tempoSemSinal = (Date.now() - ultimoPingESP) / 1000;
            if (tempoSemSinal > 35) {
                divOffline.style.display = "block";
                divOffline.innerText = "🚨 ALERTA: DISPOSITIVO OFFLINE HÁ " + Math.round(tempoSemSinal) + " SEGUNDOS!";
                evDiv.innerText = "SISTEMA DESCONECTADO\n(ESP32 RECEPTOR SEM WI-FI OU DESLIGADO)";
                evDiv.style.color = "#888";
                card.style.borderTopColor = "#555";
                card.style.animation = "none";
                txtStatus.innerText = "Status: Indisponível | Sem atividade de rede";
                txtSinal.innerText = "Sinal LoRa: INDISPONÍVEL";
            }
        }, 5000);

        // Dispara a carga inicial e conecta o motor de varredura
        consultarPainelTradicional();
        iniciarStreamRealtime();
    </script>
</body>
</html>
