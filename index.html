<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Incêndio - Real Time</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .painel {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: background-color 0.5s ease;
            background-color: #222222; /* Cor inicial neutra */
        }
        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        .status-texto {
            font-size: 20px;
            font-weight: bold;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="painel" id="painel-status">
        <h1 id="titulo-sistema">CF SISTEMAS</h1>
        <div class="status-texto" id="texto-notifier">Carregando dados da central...</div>
    </div>

    <script>
        // --- CONFIGURAÇÃO BLYNK ---
        const BLYNK_TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa"; 
        const PINO_STATUS = "V1"; 

        // Função utilitária de análise de texto idêntica à lógica do ESP32
        function obterCorPorMensagem(mensagem) {
            let mU = mensagem.toUpperCase();
            
            // 1. Prioridade Vermelha: Fogo ou Alarmes
            if (mU.includes("FIRE") || mU.includes("ALARM") || mU.includes("FOGO") || mU.includes("INCENDIO")) {
                return "#D32F2F"; // Vermelho escuro plano
            }
            // 2. Prioridade Amarela: Falhas, Avarias ou Desligamentos
            if (mU.includes("FAULT") || mU.includes("FALHA") || mU.includes("TROUBLE") || mU.includes("AVARIA") || mU.includes("DESL")) {
                return "#FBC02D"; // Amarelo plano escuro para contraste de texto branco
            }
            // 3. Prioridade Verde: Retorno ao normal ou Reset
            if (mU.includes("NORMAL") || mU.includes("RESET") || mU.includes("RESTORE")) {
                return "#388E3C"; // Verde plano
            }
            
            return "#FBC02D"; // Padrão de atenção para dados indefinidos
        }

        async function atualizarStatusTempoReal() {
            // URL da API do Blynk IoT para obter valor de pino virtual
            const url = blynk.cloud{BLYNK_TOKEN}&${PINO_STATUS};
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Erro na requisição API Blynk");
                
                const textoPuroCentral = await response.text();
                const divTexto = document.getElementById("texto-notifier");
                const divPainel = document.getElementById("painel-status");

                // Atualiza o texto na tela de forma fidedigna à central Notifier
                divTexto.innerText = textoPuroCentral;

                // Altera dinamicamente a cor de fundo do painel baseado nas palavras-chave encontradas
                divPainel.style.backgroundColor = obterCorPorMensagem(textoPuroCentral);

            } catch (error) {
                console.error("Falha ao sincronizar com o Blynk:", error);
                document.getElementById("texto-notifier").innerText = "ERRO DE COMUNICAÇÃO REMOTA";
                document.getElementById("painel-status").style.backgroundColor = "#555555";
            }
        }

        // Executa imediatamente ao abrir e agenda atualizações a cada 3 segundos
        atualizarStatusTempoReal();
        setInterval(atualizarStatusTempoReal, 3000);
    </script>
</body>
</html>
