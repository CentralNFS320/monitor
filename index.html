<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CF SISTEMAS - Real Time</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .status-card {
            background: #1a1a1a; padding: 60px 20px; border-radius: 20px; margin: 50px auto; max-width: 450px;
            box-shadow: inset 4px 4px 10px #000, 5px 5px 20px rgba(0,0,0,0.5);
            border-top: 6px solid #00ff7f; transition: 0.4s;
        }
        #status-texto { font-size: 28px; font-weight: bold; }
        .nav-btn { display: inline-block; padding: 15px 40px; background: #222; color: #0af; text-decoration: none; border-radius: 10px; border: 1px solid #333; font-weight: bold; margin-top: 20px;}
    </style>
</head>
<body>
    <h1>CF SISTEMAS</h1>
    <div id="cartao" class="status-card">
        <div id="status-texto">SINCRONIZANDO...</div>
    </div>
    <a href="historico.html" class="nav-btn">VER HISTÓRICO COMPLETO</a>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";

        function limpar(t) {
            return t.replace(/[\[\]"{} ]/g, "").replace("V1:", "");
        }

        function atualizar() {
            // Timestamp para evitar cache
            const url = `https://blynk.cloud/external/api/get?token=${TOKEN}&V1&_=${new Date().getTime()}`;
            
            fetch(url).then(r => r.text()).then(t => {
                let status = limpar(t);
                if(status.length > 30) return;

                const texto = document.getElementById('status-texto');
                const cartao = document.getElementById('cartao');
                texto.innerText = status;

                let sU = status.toUpperCase();
                if (sU.includes("FIRE") || sU.includes("FOGO") || sU.includes("ALARM")) {
                    cartao.style.borderTopColor = "#f00"; texto.style.color = "#f00";
                } else if (sU.includes("FAULT") || sU.includes("FALHA")) {
                    cartao.style.borderTopColor = "#fc0"; texto.style.color = "#fc0";
                } else {
                    cartao.style.borderTopColor = "#0f7"; texto.style.color = "#0f7";
                }
            });
        }
        setInterval(atualizar, 2000);
        atualizar();
    </script>
</body>
</html>
