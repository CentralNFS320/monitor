<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CF SISTEMAS - MONITOR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container { text-align: center; width: 95%; max-width: 800px; }

        /* IDENTIFICAÇÃO BRANCA NO TOPO */
        .identificacao {
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* O QUADRO (CARD) */
        .painel {
            padding: 40px 20px;
            border-radius: 10px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
        }

        .status-texto {
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1.4;
            padding: 0 20px;
        }

        /* --- CORES COM EFEITO DE REFLEXO LUMINOSO (GLOW) --- */

        /* MODO ALARME: Fundo Vinho / Letra Vermelha / Reflexo Vermelho */
        .alarme-on { 
            background-color: #3d0000 !important;
            border: 1px solid #ff3333 !important;
            box-shadow: 0 0 30px #ff3333; /* O REFLEXO LUMINOSO */
        }
        .alarme-on .status-texto { color: #ff3333 !important; }

        /* MODO FALHA: Fundo Marrom / Letra Amarela / Reflexo Amarelo */
        .falha-on { 
            background-color: #332b00 !important;
            border: 1px solid #ffcc00 !important;
            box-shadow: 0 0 30px #ffcc00;
        }
        .falha-on .status-texto { color: #ffcc00 !important; }

        /* MODO NORMAL: Fundo Verde Escuro / Letra Verde / Reflexo Verde */
        .normal-on { 
            background-color: #002200 !important; 
            border: 1px solid #00ff00 !important;
            box-shadow: 0 0 20px #00ff00;
        }
        .normal-on .status-texto { color: #00ff00 !important; }

        .btn-link {
            display: inline-block;
            margin-top: 40px;
            color: #444;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="identificacao">CF SISTEMAS</div>
        
        <div class="painel" id="quadro">
            <div class="status-texto" id="texto">AGUARDANDO CENTRAL...</div>
        </div>

        <a href="historico.html" class="btn-link">RASTREADOR DE EVENTOS</a>
    </div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";

        async function atualizar() {
            // Atualiza a cada 3 segundos exatos
            const url = `https://blynk.cloud/external/api/get?token=${TOKEN}&V1&_=${Date.now()}`;
            
            try {
                const response = await fetch(url);
                const data = await response.text();
                let msg = data.replace(/[\[\]"{}]/g, "").replace("V1:", "").trim();
                
                if(!msg || msg === "null") msg = "SISTEMA NORMAL";

                const quadro = document.getElementById("quadro");
                const texto = document.getElementById("texto");
                
                texto.innerText = msg;
                let m = msg.toUpperCase();

                quadro.className = "painel";

                if (m.includes("FIRE") || m.includes("ALARM") || m.includes("FOGO") || m.includes("INCENDIO")) {
                    quadro.classList.add("alarme-on");
                } 
                else if (m.includes("FAULT") || m.includes("FALHA") || m.includes("TROUBLE") || m.includes("AVARIA") || m.includes("DESL")) {
                    quadro.classList.add("falha-on");
                }
                else {
                    quadro.classList.add("normal-on");
                }

            } catch (e) {
                console.log("Erro de busca");
            }
        }

        setInterval(atualizar, 3000);
        atualizar();
    </script>
</body>
</html>
