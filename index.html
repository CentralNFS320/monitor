<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CF SISTEMAS - MONITOR</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center;
        }
        .container { width: 90%; max-width: 500px; }
        
        /* QUADRO DE STATUS - FIXO */
        .card {
            background: #111;
            padding: 50px 20px;
            border-radius: 20px;
            border: 2px solid #333;
            transition: 0.3s;
        }

        #status-texto { 
            font-size: 35px; 
            font-weight: bold; 
            text-transform: uppercase;
        }

        /* --- MODO ALARME (LANTERNA NO QUADRO) --- */
        .alarme-on {
            background: #f00 !important; /* Fundo Vermelho */
            border-color: #fff !important;
            animation: flash 0.6s infinite; /* Pulso de luz rápido */
        }
        
        .alarme-on #status-texto {
            color: #fff !important; /* Escrita Branca no fundo vermelho */
            text-shadow: 2px 2px 10px #000;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* CORES DE STATUS */
        .cor-normal { color: #0f7; }
        .cor-falha { color: #ff0; }

        .btn-link {
            display: inline-block; margin-top: 30px; padding: 10px 20px;
            color: #0af; border: 1px solid #0af; text-decoration: none; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color:#0af; margin-bottom:20px;">CF SISTEMAS</h2>
        
        <div id="painel" class="card">
            <div id="status-texto">CARREGANDO...</div>
        </div>

        <a href="historico.html" class="btn-link">📜 RASTREADOR DE EVENTOS</a>
    </div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";

        function atualizar() {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V1&_=${Date.now()}`)
                .then(r => r.text())
                .then(data => {
                    let msg = data.replace(/[\[\]"{}]/g, "").replace("V1:", "").trim();
                    if (!msg || msg === "null") msg = "SISTEMA NORMAL";

                    const texto = document.getElementById('status-texto');
                    const painel = document.getElementById('painel');
                    texto.innerText = msg;

                    let m = msg.toUpperCase();

                    // VOLTANDO AO PADRÃO INICIAL
                    if (m.includes("FIRE") || m.includes("ALARM") || m.includes("FOGO") || m.includes("INCENDIO")) {
                        painel.className = "card alarme-on";
                        texto.className = "";
                    } 
                    else {
                        painel.className = "card"; // Volta ao quadro normal parado
                        if (m.includes("NORMAL")) {
                            texto.className = "cor-normal";
                        } else {
                            texto.className = "cor-falha";
                        }
                    }
                });
        }
        setInterval(atualizar, 1500);
        atualizar();
    </script>
</body>
</html>
