<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico CF SISTEMAS</title>
    <style>
        body { background: #000; color: #0f7; font-family: monospace; padding: 20px; }
        #log { border: 1px solid #333; height: 500px; overflow-y: auto; padding: 10px; background: #050505; margin-bottom: 20px; }
        .btn { padding: 10px 20px; background: #222; color: #0af; border: 1px solid #0af; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <h2>📜 HISTÓRICO DA MEMÓRIA ESP32</h2>
    <div id="log">Aguardando dados...</div>
    
    <button class="btn" onclick="solicitarCarga()">CARREGAR MEMÓRIA COMPLETA</button>
    <a href="index.html" class="btn">VOLTAR</a>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        let ultimaMensagem = "";

        function solicitarCarga() {
            document.getElementById('log').innerHTML = "Lendo memória do ESP32...";
            // Aciona o V3 no ESP32 para ele começar a despejar o arquivo no V2
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V3=1`);
        }

        function monitorarV2() {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2&_=${Date.now()}`)
                .then(r => r.text())
                .then(data => {
                    let msg = data.replace(/[\[\]"{}]/g, "").replace("V2:", "").trim();
                    
                    // Se a mensagem for nova, adiciona na lista (sem apagar as anteriores)
                    if (msg !== "" && msg !== "null" && msg !== ultimaMensagem) {
                        const logDiv = document.getElementById('log');
                        if(logDiv.innerText.includes("Aguardando") || logDiv.innerText.includes("Lendo")) logDiv.innerHTML = "";
                        
                        logDiv.innerHTML = `<div>> ${msg}</div>` + logDiv.innerHTML;
                        ultimaMensagem = msg;
                    }
                });
        }

        setInterval(monitorarV2, 1500);
    </script>
</body>
</html>
