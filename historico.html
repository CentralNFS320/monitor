<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CF SISTEMAS - Histórico</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; padding: 20px; text-align: center; }
        .panel { background: #151515; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        input[type="date"] { background: #222; color: #fff; border: 1px solid #444; padding: 10px; width: 80%; border-radius: 5px; }
        .btn { background: #007bff; color: #fff; border: none; padding: 12px; border-radius: 5px; width: 80%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .log-box { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: left; border-left: 5px solid #0af; margin-top: 10px; font-family: monospace; }
        .btn-voltar { color: #888; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-voltar">← Voltar ao Painel Principal</a>
    <div class="panel">
        <button class="btn" onclick="lerTudo()">CARREGAR TODA A MEMÓRIA</button>
        <p>Ou busque por uma data:</p>
        <input type="date" id="dataBusca" onchange="buscar()">
    </div>
    <div id="logs"></div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";

        function lerTudo() {
            document.getElementById('logs').innerHTML = "Solicitando memória...";
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V3=1`);
        }

        function buscar() {
            let d = document.getElementById('dataBusca').value;
            if(!d) return;
            let partes = d.split('-');
            let dataFormatada = partes[2] + '/' + partes[1] + '/' + partes[0].substring(2);
            document.getElementById('logs').innerHTML = "Buscando data: " + dataFormatada;
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V4=${dataFormatada}`);
        }

        function monitorar() {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2`)
            .then(r => r.text()).then(t => {
                let data = t.replace(/[\[\]"{} ]/g, "").replace("V2:", "");
                if (data.length > 5) {
                    const box = document.getElementById('logs');
                    if (data.includes("\n")) {
                        box.innerHTML = "";
                        data.split('\n').reverse().forEach(linha => {
                            if(linha.length > 5) box.innerHTML += `<div class="log-box">${linha}</div>`;
                        });
                    } else {
                        box.innerHTML = `<div class="log-box">${data}</div>`;
                    }
                }
            });
        }
        setInterval(monitorar, 3000);
    </script>
</body>
</html>
