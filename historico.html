<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico CF SISTEMAS</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #log { width: 100%; height: 400px; border: 1px solid #333; overflow-y: scroll; background: #050505; padding: 10px; margin-bottom: 20px; }
        .btn { padding: 15px; background: #222; color: #0af; border: 1px solid #0af; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <h2>📜 REGISTRO DE EVENTOS</h2>
    <div id="log">Aguardando novos eventos...</div>
    
    <button class="btn" onclick="limparLog()">LIMPAR TELA</button>
    <button class="btn" onclick="carregarAntigos()">CARREGAR MEMÓRIA ESP32</button>
    <a href="index.html" class="btn">VOLTAR</a>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        let ultimaMensagemRecebida = "";

        function limparLog() { document.getElementById('log').innerHTML = ""; }

        function carregarAntigos() {
            // Avisa o ESP32 (V3) para mandar o que está salvo no chip
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V3=1`);
        }

        function monitorarV2() {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2`)
                .then(r => r.text())
                .then(data => {
                    let msg = data.replace(/[\[\]"{}]/g, "").replace(/^V2:/, "").trim();
                    
                    // Só adiciona se for uma mensagem nova
                    if (msg !== "" && msg !== "null" && msg !== ultimaMensagemRecebida) {
                        const logDiv = document.getElementById('log');
                        const dataHora = new Date().toLocaleString();
                        logDiv.innerHTML = `<div>[${dataHora}] ${msg}</div>` + logDiv.innerHTML;
                        ultimaMensagemRecebida = msg;
                    }
                });
        }

        // Verifica novos eventos a cada 2 segundos
        setInterval(monitorarV2, 2000);
    </script>
</body>
</html>
