<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico - CF SISTEMAS</title>
    <style>
        body { background: #0d0d0d; color: #fff; font-family: sans-serif; text-align: center; }
        .log-container { background: #1a1a1a; padding: 20px; border-radius: 10px; max-width: 600px; margin: 20px auto; border: 1px solid #333; height: 300px; overflow-y: auto; text-align: left; color: #0f7; font-family: monospace; }
        .btn { background: #0af; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin: 10px; }
    </style>
</head>
<body>
    <h1>HISTÓRICO DA CENTRAL</h1>
    <button class="btn" onclick="solicitarHistórico()">Carregar Histórico (Memória ESP32)</button>
    <div class="log-container" id="log-box">Aguardando dados...</div>
    <br>
    <a href="index.html" class="btn" style="background: #444;">Voltar para Home</a>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";

        function solicitarHistórico() {
            document.getElementById('log-box').innerText = "Solicitando memória ao dispositivo...";
            // Ativa o V3 no ESP32
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V3=1`)
            .then(() => {
                setTimeout(buscarV2, 2000); // Espera 2 segundos para o ESP enviar
            });
        }

        function buscarV2() {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2`)
            .then(r => r.text())
            .then(data => {
                let limpo = data.replace(/[\[\]"{}]/g, "").replace(/^V2:/, "").trim();
                if (limpo === "null" || limpo === "") {
                    document.getElementById('log-box').innerText = "Histórico vazio ou dispositivo offline.";
                } else {
                    document.getElementById('log-box').innerText = limpo;
                }
            });
        }

        // Monitoramento em tempo real (adiciona novas falhas conforme ocorrem)
        setInterval(() => {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2`)
            .then(r => r.text())
            .then(data => {
                let msg = data.replace(/[\[\]"{}]/g, "").replace(/^V2:/, "").trim();
                if(msg !== "null" && msg !== "") {
                    const box = document.getElementById('log-box');
                    if(!box.innerText.includes(msg)) {
                        box.innerHTML = `> ${msg}<br>` + box.innerHTML;
                    }
                }
            });
        }, 3000);
    </script>
</body>
</html>
