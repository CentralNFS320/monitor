<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Eventos Circular (Máx 800)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 20px;
        }
        .controles {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #005a9e;
        }
        .log-lista {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .linha-evento {
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            border-left: 5px solid transparent;
            background-color: #2d2d2d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HISTÓRICO DA CENTRAL NOTIFIER</h1>
        
        <div class="controles">
            <button onclick="solicitarHistoricoCompleto()">Carregar Histórico (Até 800 Eventos)</button>
        </div>

        <div class="log-lista" id="lista-eventos">
            <div style="text-align: center; color: #888;">Clique no botão acima para ler a memória flash do ESP32.</div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO BLYNK ---
        const BLYNK_TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        const PINO_GATILHO_V3 = "V3";
        const PINO_DADOS_V2 = "V2";

        function obterEstiloPorMensagem(mensagem) {
            let mU = mensagem.toUpperCase();
            
            if (mU.includes("FIRE") || mU.includes("ALARM") || mU.includes("FOGO") || mU.includes("INCENDIO")) {
                return { corTexto: "#ff4444", borda: "#D32F2F" };
            }
            if (mU.includes("FAULT") || mU.includes("FALHA") || mU.includes("TROUBLE") || mU.includes("AVARIA") || mU.includes("DESL")) {
                return { corTexto: "#ffbb33", borda: "#FBC02D" };
            }
            if (mU.includes("NORMAL") || mU.includes("RESET") || mU.includes("RESTORE")) {
                return { corTexto: "#00C851", borda: "#388E3C" };
            }
            return { corTexto: "#ffbb33", borda: "#FBC02D" };
        }

        async function solicitarHistoricoCompleto() {
            const containerLog = document.getElementById("lista-eventos");
            containerLog.innerHTML = `<div style="text-align: center; color: #aaa;">Solicitando dados ao ESP32... Aguarde.</div>`;

            try {
                // 1. Envia pulso '1' para o pino V3 para acionar a varredura do arquivo interno do ESP32
                await fetch(`blynk.cloud{BLYNK_TOKEN}&${PINO_GATILHO_V3}=1`);
                
                // Aguarda um pequeno intervalo de 1.5 segundos para o ESP32 descarregar o fluxo de linhas no buffer V2
                await new Promise(resolve => setTimeout(resolve, 1500));

                // 2. Coleta o resultado acumulado que o ESP32 enviou para a API do pino V2
                const response = await fetch(`blynk.cloud{BLYNK_TOKEN}&${PINO_DADOS_V2}`);
                if (!response.ok) throw new Error("Erro ao coletar dados do histórico");

                const dadosBrutos = await response.text();
                
                // Limpa o container para processar as linhas recebidas
                containerLog.innerHTML = "";

                // Quebra a string recebida em linhas individuais de log
                const linhas = dadosBrutos.split('\n');
                let eventosAdicionados = 0;

                linhas.forEach(linha => {
                    let linhaLimpa = linha.trim();
                    if (linhaLimpa.length > 2) {
                        const divLinha = document.createElement("div");
                        divLinha.className = "linha-evento";
                        divLinha.innerText = linhaLimpa;

                        // Obtém a estilização customizada com base nas regras textuais da Notifier
                        const estilo = obterEstiloPorMensagem(linhaLimpa);
                        divLinha.style.color = estilo.corTexto;
                        divLinha.style.borderLeftColor = estilo.borda;

                        containerLog.appendChild(divLinha);
                        eventosAdicionados++;
                    }
                });

                if(eventosAdicionados === 0) {
                    containerLog.innerHTML = `<div style="text-align: center; color: #888;">Nenhum evento registrado no arquivo interno.</div>`;
                }

                // Reseta o gatilho virtual do pino V3 de volta para 0 no Blynk
                await fetch(`blynk.cloud{BLYNK_TOKEN}&${PINO_GATILHO_V3}=0`);

            } catch (error) {
                console.error("Falha ao recuperar histórico:", error);
                containerLog.innerHTML = `<div style="text-align: center; color: #ff4444;">Erro ao conectar com o ESP32 ou histórico vazio.</div>`;
            }
        }
    </script>
</body>
</html>
