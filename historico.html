<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rastreador de Eventos - CF SISTEMAS</title>
    <style>
        body { background: #050505; color: #0f7; font-family: 'Courier New', monospace; padding: 20px; }
        #painel { border: 2px solid #333; background: #000; height: 700px; overflow-y: auto; padding: 15px; border-radius: 10px; }
        .linha { border-bottom: 1px solid #1a1a1a; padding: 10px 0; font-size: 14px; display: flex; }
        .tempo { color: #0af; min-width: 150px; font-weight: bold; }
        .msg { color: #eee; margin-left: 10px; }
        .btn-home { display: inline-block; padding: 10px 20px; background: #222; color: #fff; text-decoration: none; border-radius: 5px; margin-bottom: 15px; border: 1px solid #0af; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-home">⬅ VOLTAR PARA INÍCIO</a>
    <h2 style="text-align:center; color:#0af;">RASTREADOR DE EVENTOS HISTÓRICOS</h2>
    
    <div id="painel">Conectando ao banco de dados do ESP32...</div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        let ultimoEnviado = "";

        function puxarDados() {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2&_=${Date.now()}`)
                .then(r => r.text())
                .then(data => {
                    let bruta = data.replace(/[\[\]"{}]/g, "").replace("V2:", "").trim();
                    
                    // Se a mensagem contém o carimbo de data [dd/mm hh:mm:ss] e é nova
                    if (bruta !== "" && bruta !== "null" && bruta !== ultimoEnviado) {
                        const painel = document.getElementById('painel');
                        if (painel.innerText.includes("Conectando")) painel.innerHTML = "";
                        
                        // Divide a data da mensagem para formatar
                        let partes = bruta.split('] ');
                        let dataHora = partes[0].replace('[', '');
                        let texto = partes[1] || "";

                        const div = document.createElement('div');
                        div.className = "linha";
                        div.innerHTML = `<span class="tempo">${dataHora}</span> <span class="msg">${texto}</span>`;
                        
                        // Adiciona no topo para o evento mais recente aparecer primeiro
                        painel.insertBefore(div, painel.firstChild);
                        ultimoEnviado = bruta;
                    }
                });
        }
        setInterval(puxarDados, 2000);
    </script>
</body>
</html>
