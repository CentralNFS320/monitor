<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico - CF SISTEMAS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .header-busca { background: #111; padding: 20px; border-radius: 10px; border-bottom: 3px solid #0af; margin-bottom: 20px; }
        input[type="date"] { padding: 10px; border-radius: 5px; font-size: 16px; margin: 10px; }
        .btn { padding: 10px 20px; background: #0af; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #log { background: #050505; border: 1px solid #333; height: 600px; overflow-y: auto; text-align: left; padding: 20px; font-family: monospace; }
        .alarme-msg { color: #f00; font-weight: bold; background: rgba(255,0,0,0.1); border-left: 5px solid #f00; padding: 10px; margin: 5px 0; }
        .normal-msg { border-bottom: 1px solid #222; padding: 5px 0; color: #0f7; }
    </style>
</head>
<body>
    <div class="header-busca">
        <h2 style="color:#0af">🔎 RASTREADOR DE EVENTOS</h2>
        <input type="date" id="calendario">
        <button class="btn" onclick="buscar()">BUSCAR DATA</button>
        <button class="btn" style="background:#444" onclick="document.getElementById('log').innerHTML=''">LIMPAR</button>
        <a href="index.html" style="color:#666; margin-left:15px; text-decoration:none;">Painel Home</a>
    </div>

    <div id="log">Selecione uma data no calendário para buscar...</div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        let ultimo = "";

        function buscar() {
            const data = document.getElementById('calendario').value;
            if(!data) return alert("Escolha uma data!");
            document.getElementById('log').innerHTML = "Buscando memória...";
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V3=${data}`);
        }

        setInterval(() => {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2&_=${Date.now()}`)
                .then(r => r.text())
                .then(data => {
                    let msg = data.replace(/[\[\]"{}]/g, "").replace("V2:", "").trim();
                    if (msg && msg !== "null" && msg !== ultimo) {
                        const log = document.getElementById('log');
                        if(log.innerText.includes("Selecione") || log.innerText.includes("Buscando")) log.innerHTML = "";
                        
                        const div = document.createElement('div');
                        // Se a mensagem bruta da central tiver indicativo de alarme
                        let isAlarme = msg.includes("FIRE") || msg.includes("ALARM") || msg.includes("FOGO");
                        div.className = isAlarme ? "alarme-msg" : "normal-msg";
                        div.innerText = msg;
                        
                        log.insertBefore(div, log.firstChild);
                        ultimo = msg;
                    }
                });
        }, 1500);
    </script>
</body>
</html>
