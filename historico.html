<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico Remoto - CF SISTEMAS</title>
    <style>
        body { background: #0a0a0a; color: #0f7; font-family: 'Courier New', monospace; padding: 20px; }
        #log { 
            border: 1px solid #333; height: 650px; overflow-y: auto; 
            padding: 15px; background: #050505; border-radius: 10px;
            display: flex; flex-direction: column; /* Ordem de leitura */
        }
        .linha { border-bottom: 1px solid #1a1a1a; padding: 8px 0; color: #eee; }
        .data { color: #0af; font-size: 12px; margin-right: 10px; }
    </style>
</head>
<body>
    <h2 style="color:#0af; text-align:center;">📜 HISTÓRICO DE EVENTOS REMOTO</h2>
    
    <div id="log">Aguardando novos eventos da central...</div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        let ultimoEvento = "";

        function atualizar() {
            // Buscamos o V2 (Onde o ESP32 joga as falhas uma por uma)
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2&_=${Date.now()}`)
                .then(r => r.text())
                .then(data => {
                    let msg = data.replace(/[\[\]"{}]/g, "").replace("V2:", "").trim();
                    
                    if (msg !== "" && msg !== "null" && msg !== ultimoEvento) {
                        const log = document.getElementById('log');
                        if (log.innerText.includes("Aguardando")) log.innerHTML = "";
                        
                        const div = document.createElement('div');
                        div.className = "linha";
                        const d = new Date();
                        const hora = d.toLocaleDateString() + " " + d.toLocaleTimeString();
                        
                        div.innerHTML = `<span class="data">[${hora}]</span> ${msg}`;
                        
                        // Adiciona no final da lista (como uma impressora)
                        log.appendChild(div);
                        log.scrollTop = log.scrollHeight; // Auto-scroll para o final
                        
                        ultimoEvento = msg;
                    }
                });
        }

        // Verifica a cada 2 segundos se a central "disse" algo novo
        setInterval(atualizar, 2000);
    </script>
</body>
</html>
