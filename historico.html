<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CFSISTEMAS - Histórico</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 15px; }
        .topo { background: #0a0a0a; padding: 20px; border: 2px solid #222; border-radius: 12px; margin-bottom: 20px; }
        input[type="date"] { padding: 10px; border-radius: 5px; background: #222; color: #fff; border: 1px solid #444; }
        .btn { padding: 12px 20px; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn-data { background: #0af; }
        .btn-tudo { background: #388E3C; }
        .btn-limpar { background: #444; }
        #log { background: #050505; border: 1px solid #222; height: 500px; overflow-y: auto; text-align: left; padding: 20px; font-family: monospace; font-size: 14px; margin-top: 15px; }
        .linha { border-bottom: 1px solid #111; padding: 5px 0; color: #0f7; }
        .linha-fogo { color: #f44; font-weight: bold; background: rgba(255,0,0,0.1); padding: 5px; border-left: 4px solid #f44; }
    </style>
</head>
<body>

    <div class="topo">
        <h2 style="color:#0af; margin-top:0;">CFSISTEMAS - RASTREADOR</h2>
        <input type="date" id="input-data">
        <button class="btn btn-data" onclick="carregarData()">BUSCAR DATA</button>
        <button class="btn btn-tudo" onclick="carregarTudo()">CARREGAR TUDO</button>
        <button class="btn btn-limpar" onclick="limpar()">LIMPAR TELA</button>
        <br><br>
        <a href="index.html" style="color:#666; text-decoration:none; font-size:12px;">Voltar ao Painel Home</a>
    </div>

    <div id="log">Aguardando comando...</div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        let ultimo = "";
        let rodando = false;

        function carregarData() {
            const data = document.getElementById('input-data').value;
            if(!data) return alert("Selecione uma data!");
            limpar();
            document.getElementById('log').innerText = "🔍 Buscando dia " + data + "...";
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V3=${data}`);
            iniciarEscuta();
        }

        function carregarTudo() {
            limpar();
            document.getElementById('log').innerText = "🛰️ Carregando todos os eventos da memória...";
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V4=1`);
            iniciarEscuta();
        }

        function limpar() { document.getElementById('log').innerHTML = ""; ultimo = ""; }

        function iniciarEscuta() {
            if (rodando) return;
            rodando = true;
            setInterval(() => {
                fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2&_=${Date.now()}`)
                .then(r => r.text())
                .then(data => {
                    let msg = data.replace(/[\[\]"{}]/g, "").replace("V2:", "").trim();
                    if (msg && msg !== "null" && msg !== ultimo) {
                        const log = document.getElementById('log');
                        if(log.innerText.includes("Carregando") || log.innerText.includes("Aguardando") || log.innerText.includes("Buscando")) log.innerHTML = "";
                        
                        const div = document.createElement('div');
                        let isFogo = msg.includes("FIRE") || msg.includes("ALARM") || msg.includes("FOGO");
                        div.className = isFogo ? "linha-fogo" : "linha";
                        div.innerText = msg;
                        
                        log.insertBefore(div, log.firstChild);
                        ultimo = msg;
                    }
                });
            }, 1200);
        }
    </script>
</body>
</html>
