<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico CF SISTEMAS</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .log-container { 
            background: #111; border: 2px solid #333; max-width: 800px; margin: 20px auto; 
            height: 500px; overflow-y: auto; border-radius: 10px; text-align: left; padding: 15px;
        }
        .evento { border-bottom: 1px solid #222; padding: 8px 0; font-size: 14px; }
        .data { color: #0af; font-weight: bold; margin-right: 10px; }
        .msg { color: #eee; }
        .btn { padding: 12px 25px; background: #0af; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .falha { color: #ff0; }
        .alarme { color: #f00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>HISTÓRICO DE EVENTOS (MÁX 800)</h1>
    
    <button class="btn" onclick="carregarMemoria()">CARREGAR MEMÓRIA DO ESP32</button>
    <a href="index.html" style="text-decoration:none; color:#666; margin-left:20px;">Voltar</a>

    <div class="log-container" id="listaEventos">
        </div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        let ultimoEvento = "";

        function carregarMemoria() {
            document.getElementById('listaEventos').innerHTML = "<div>Lendo memória interna...</div>";
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V3=1`);
        }

        function adicionarNaTela(msg) {
            if (!msg || msg === "null" || msg === ultimoEvento) return;
            ultimoEvento = msg;

            const lista = document.getElementById('listaEventos');
            const data = new Date().toLocaleString();
            
            let classe = "msg";
            if(msg.includes("FIRE") || msg.includes("ALARM")) classe = "alarme";
            if(msg.includes("PROBL") || msg.includes("ABERTO")) classe = "falha";

            const item = `<div class="evento"><span class="data">[${data}]</span><span class="${classe}">${msg}</span></div>`;
            
            // Adiciona no topo
            lista.innerHTML = item + lista.innerHTML;
        }

        // Monitora o pino V2 continuamente
        setInterval(() => {
            fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2&_=${Date.now()}`)
                .then(r => r.text())
                .then(adicionarNaTela);
        }, 2000);
    </script>
</body>
</html>
