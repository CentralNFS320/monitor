<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CFSISTEMAS - Histórico</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 15px; }
        .topo { background: #0a0a0a; padding: 20px; border: 2px solid #222; border-radius: 12px; margin-bottom: 20px; }
        .btn { padding: 12px 20px; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-recentes { background: #388E3C; }
        .btn-data { background: #0af; }
        input[type="date"] { padding: 10px; border-radius: 5px; background: #222; color: #fff; border: 1px solid #444; }
        #log { background: #050505; border: 1px solid #222; height: 500px; overflow-y: auto; text-align: left; padding: 20px; font-family: monospace; font-size: 14px; margin-top: 15px; }
        .linha { border-bottom: 1px solid #111; padding: 5px 0; color: #0f7; }
    </style>
</head>
<body>
    <div class="topo">
        <h2 style="color:#0af; margin-top:0;">RASTREADOR CFSISTEMAS</h2>
        <button class="btn btn-recentes" onclick="carregarRecentes()">MOSTRAR 50 RECENTES</button>
        <hr style="border:0; border-top:1px solid #222; margin:15px 0;">
        <input type="date" id="input-data">
        <button class="btn btn-data" onclick="carregarData()">BUSCAR POR DATA</button>
        <br><br><a href="index.html" style="color:#666; text-decoration:none; font-size:12px;">Voltar ao Painel</a>
    </div>
    <div id="log">Clique em um botão para carregar...</div>

    <script>
        const TOKEN = "aLLr6CClMLHVuL_8TmmF6EcG8vZQ5aBa";
        let rodando = false;

        function carregarRecentes() {
            limpar();
            document.getElementById('log').innerText = "Carregando últimos 50 eventos...";
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V4=1`);
            escutar();
        }

        function carregarData() {
            const d = document.getElementById('input-data').value;
            if(!d) return alert("Selecione a data!");
            limpar();
            document.getElementById('log').innerText = "Buscando data: " + d;
            fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V3=${d}`);
            escutar();
        }

        function limpar() { document.getElementById('log').innerHTML = ""; }

        function escutar() {
            if (rodando) return; rodando = true;
            setInterval(() => {
                fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&V2&_=${Date.now()}`)
                .then(r => r.text())
                .then(t => {
                    let msg = t.replace(/[\[\]"{}]/g, "").replace("V2:", "").trim();
                    if(msg && msg !== "null") {
                        const log = document.getElementById('log');
                        if(log.innerText.includes("Carregando") || log.innerText.includes("Buscando")) log.innerHTML = "";
                        const div = document.createElement('div');
                        div.className = "linha";
                        div.innerText = msg;
                        log.insertBefore(div, log.firstChild);
                    }
                });
            }, 1200);
        }
    </script>
</body>
</html>
